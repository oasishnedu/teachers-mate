<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teachers' Mate (담임ver.)</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#10b981">
    <link rel="icon" type="image/png" href="icon-512.png">
    <link rel="apple-touch-icon" href="icon-512.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TeachersMate">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@0.474.0/dist/umd/lucide.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    
    <style>
        @font-face {
          font-family: 'NanumSquareRound';
          src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_two@1.0/NanumSquareRound.woff') format('woff');
          font-weight: normal;
          font-style: normal;
        }
        body { 
            font-family: 'NanumSquareRound', -apple-system, sans-serif; 
            background-color: #fdfbf7; 
            color: #292524;
            -webkit-tap-highlight-color: transparent;
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        select { -webkit-appearance: none; -moz-appearance: none; appearance: none; }
        input, button, select, textarea { font-size: 16px !important; }
        
        /* PIN 애니메이션 */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .shake-animation { animation: shake 0.3s ease-in-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- 공통 변수 및 유틸리티 ---
        const Icon = ({ name, size = 20, className = "", strokeWidth = 2 }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    iconRef.current.innerHTML = '';
                    const i = document.createElement('i');
                    i.setAttribute('data-lucide', name);
                    iconRef.current.appendChild(i);
                    window.lucide.createIcons({ root: iconRef.current, attrs: { width: size, height: size, 'stroke-width': strokeWidth } });
                }
            }, [name, size, strokeWidth]);
            return <span ref={iconRef} className={`inline-flex items-center justify-center ${className}`}></span>;
        };

        const INITIAL_HOLIDAYS = {
          '2026-01-01': '신정', '2026-02-16': '설날 연휴', '2026-02-17': '설날', '2026-02-18': '설날 연휴',
          '2026-03-01': '삼일절', '2026-03-02': '대체공휴일', '2026-05-05': '어린이날', '2026-05-24': '부처님오신날', '2026-05-25': '대체공휴일',
          '2026-06-03': '지방선거일', '2026-06-06': '현충일', '2026-08-15': '광복절', '2026-09-24': '추석 연휴', '2026-09-25': '추석', '2026-09-26': '추석 연휴',
          '2026-10-03': '개천절', '2026-10-09': '한글날', '2026-12-25': '기독탄신일'
        };
        const DEFAULT_TIMETABLE = { 1: Array(8).fill(''), 2: Array(8).fill(''), 3: Array(8).fill(''), 4: Array(8).fill(''), 5: Array(8).fill('') };
        const ATTENDANCE_SUB_TYPES = ['질병', '감염병', '경조사', '생리', '기타', '미인정', '장기'];
        
        const getFormatDate = (date) => {
          const y = date.getFullYear(); const m = String(date.getMonth() + 1).padStart(2, '0'); const d = String(date.getDate()).padStart(2, '0');
          return `${y}-${m}-${d}`;
        };

        const exportToExcel = (filename, headers, data) => {
          if (typeof XLSX === 'undefined') return alert('엑셀 로딩 중입니다. 잠시 후 시도해주세요.');
          const worksheet = XLSX.utils.aoa_to_sheet([headers, ...data]);
          const workbook = XLSX.utils.book_new();
          XLSX.utils.book_append_sheet(workbook, worksheet, "Sheet1");
          XLSX.writeFile(workbook, filename);
        };

        // 스마트 복사 및 스프레드시트 내보내기 유틸리티
        const exportToGoogleSheets = async (headers, data, sheetName) => {
            const tsvContent = [headers.join('\t'), ...data.map(row => row.map(cell => {
                let cellStr = String(cell || '');
                if (cellStr.includes('\n') || cellStr.includes('\t') || cellStr.includes('"')) {
                    cellStr = `"${cellStr.replace(/"/g, '""')}"`;
                }
                return cellStr;
            }).join('\t'))].join('\n');

            const successMessage = `✨ [${sheetName}] 데이터가 임시 복사되었습니다!\n\n1. 잠시 후 새 창에 빈 구글 스프레드시트가 열립니다.\n2. [A1] 칸(첫 번째 네모칸)을 클릭하세요.\n3. 키보드에서 [Ctrl + V] (맥은 Cmd + V)를 눌러 붙여넣기 하세요!`;

            try {
                await navigator.clipboard.writeText(tsvContent);
                alert(successMessage);
                window.open('https://docs.google.com/spreadsheets/u/0/create', '_blank');
            } catch (err) {
                const textArea = document.createElement("textarea");
                textArea.value = tsvContent;
                textArea.style.position = "fixed";
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    alert(successMessage);
                    window.open('https://docs.google.com/spreadsheets/u/0/create', '_blank');
                } catch (e) {
                    alert('복사에 실패했습니다. 기기 환경을 확인해주세요.');
                }
                document.body.removeChild(textArea);
            }
        };

        // --- 간편 4자리 PIN 로그인 화면 ---
        function PinScreen({ isSetup, onComplete }) {
            const [pin, setPin] = useState('');
            const [newPinStore, setNewPinStore] = useState(''); // 새로 설정할 PIN 임시 저장
            const [error, setError] = useState(false);
            const [step, setStep] = useState(isSetup ? 'ENTER_PIN' : 'LOGIN');
            const [hint, setHint] = useState('');
            const [showHelper, setShowHelper] = useState(false);
            
            // alert() 및 confirm() 팝업 차단 문제를 해결하기 위한 내부 상태 추가
            const [visibleHint, setVisibleHint] = useState(false);
            const [resetStep, setResetStep] = useState(0); 
            const [successMsg, setSuccessMsg] = useState('');

            const savedHint = localStorage.getItem('tm_local_hint') || '설정된 힌트가 없습니다.';

            useEffect(() => {
                setVisibleHint(false); // 단계가 바뀔 때 힌트는 다시 숨김
            }, [step]);

            const handleNumberClick = (num) => {
                if (pin.length < 4) {
                    const newPin = pin + num;
                    setPin(newPin);
                    setError(false);
                    
                    if (newPin.length === 4) {
                        setTimeout(() => {
                            if (step === 'ENTER_PIN') {
                                setNewPinStore(newPin);
                                setStep('SET_HINT');
                            } else if (step === 'LOGIN') {
                                const savedPin = localStorage.getItem('tm_local_pin');
                                if (newPin === savedPin) {
                                    onComplete();
                                } else {
                                    setError(true);
                                    setPin('');
                                    setShowHelper(true);
                                }
                            } else if (step === 'CHANGE_PIN_AUTH') {
                                // 현재 비밀번호 확인 단계
                                const savedPin = localStorage.getItem('tm_local_pin');
                                if (newPin === savedPin) {
                                    setPin('');
                                    setStep('CHANGE_PIN_NEW');
                                    setShowHelper(false); // 힌트 버튼 숨기기
                                } else {
                                    setError(true);
                                    setPin('');
                                    setShowHelper(true); // 틀렸을 경우 힌트 버튼 활성화
                                }
                            } else if (step === 'CHANGE_PIN_NEW') {
                                // 새 비밀번호 입력 완료 단계
                                setNewPinStore(newPin);
                                setPin('');
                                setStep('CHANGE_PIN_HINT');
                            }
                        }, 200);
                    }
                }
            };

            const handleDelete = () => { setPin(pin.slice(0, -1)); setError(false); };
            
            const handleSaveSetup = () => { 
                localStorage.setItem('tm_local_pin', newPinStore); 
                localStorage.setItem('tm_local_hint', hint); 
                if (step === 'CHANGE_PIN_HINT') {
                    setSuccessMsg('비밀번호가 성공적으로 변경되었습니다.');
                    setTimeout(() => {
                        setSuccessMsg('');
                        setPin('');
                        setHint('');
                        setStep('LOGIN');
                        setVisibleHint(false);
                    }, 2000);
                } else {
                    onComplete(); 
                }
            };
            
            // 브라우저 기본 confirm 대신 사용할 커스텀 경고 모달 로직
            const handleResetApp = () => setResetStep(1);
            const confirmReset1 = () => setResetStep(2);
            const confirmReset2 = () => {
                localStorage.removeItem('tm_local_data'); localStorage.removeItem('tm_local_pin'); localStorage.removeItem('tm_local_hint');
                window.location.reload();
            };
            const cancelReset = () => setResetStep(0);

            // PIN 변경 성공 시 띄워줄 자체 화면
            if (successMsg) {
                return (
                    <div className="min-h-screen bg-[#fdfbf7] flex flex-col items-center justify-center p-6">
                        <div className="bg-white p-10 rounded-3xl shadow-xl max-w-sm w-full border border-emerald-100 text-center transition-all duration-300">
                            <div className="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-inner"><Icon name="check-circle" size={32} /></div>
                            <h2 className="text-xl font-black text-emerald-700 mb-2">변경 완료!</h2>
                            <p className="text-stone-600 font-bold mb-6 text-sm leading-relaxed">{successMsg}<br/>새로운 비밀번호로 로그인해주세요.</p>
                        </div>
                    </div>
                );
            }

            if (step === 'SET_HINT' || step === 'CHANGE_PIN_HINT') {
                return (
                    <div className="min-h-screen bg-[#fdfbf7] flex flex-col items-center justify-center p-6">
                        <div className="bg-white p-10 rounded-3xl shadow-xl max-w-sm w-full border border-stone-100 text-center">
                            <div className="w-16 h-16 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-inner"><Icon name="help-circle" size={32} /></div>
                            <h2 className="text-xl font-black text-stone-800 mb-2">비밀번호 힌트 설정 (선택)</h2>
                            <p className="text-stone-500 font-medium mb-6 text-sm break-keep leading-relaxed">나중에 비밀번호를 잊어버렸을 때를 대비해<br/>나만 알 수 있는 단어나 힌트를 적어주세요.</p>
                            <input type="text" value={hint} onChange={e=>setHint(e.target.value)} placeholder="예) 내 생일, 강아지 이름" className="w-full p-4 bg-stone-50 border border-stone-200 rounded-xl font-bold text-stone-700 outline-none focus:border-blue-400 focus:bg-white text-center mb-6 transition-colors" />
                            <button onClick={handleSaveSetup} className="w-full py-4 bg-emerald-600 text-white font-bold rounded-2xl hover:bg-emerald-700 active:scale-95 transition-all shadow-sm">설정 완료</button>
                        </div>
                    </div>
                );
            }

            // 각 단계별 제목/설명/아이콘 동적 변경
            let titleText = "Teachers' Mate";
            let subText = "설정하신 4자리 비밀번호를 입력해주세요.";
            let iconName = "lock";
            
            if (step === 'ENTER_PIN') {
                subText = "나만의 4자리 앱 비밀번호를 설정해주세요.";
                iconName = "shield-plus";
            } else if (step === 'CHANGE_PIN_AUTH') {
                titleText = "비밀번호 확인";
                subText = "현재 사용 중인 비밀번호를 먼저 입력해주세요.";
                iconName = "key";
            } else if (step === 'CHANGE_PIN_NEW') {
                titleText = "새 비밀번호 설정";
                subText = "새롭게 사용할 4자리 비밀번호를 입력해주세요.";
                iconName = "shield-check";
            }

            return (
                <div className="min-h-screen bg-[#fdfbf7] flex flex-col items-center justify-center p-6">
                    <div className={`bg-white p-10 rounded-3xl shadow-xl max-w-sm w-full border border-stone-100 text-center ${error ? 'shake-animation' : ''}`}>
                        <div className="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-inner">
                            <Icon name={iconName} size={32} />
                        </div>
                        <h1 className="text-2xl font-black text-stone-800 mb-2">{titleText}</h1>
                        <p className="text-stone-500 font-bold mb-8 break-keep">{subText}</p>
                        <div className="flex justify-center gap-4 mb-10">
                            {[0, 1, 2, 3].map((index) => (<div key={index} className={`w-4 h-4 rounded-full transition-colors ${index < pin.length ? 'bg-emerald-500' : 'bg-stone-200'}`}></div>))}
                        </div>
                        {error && <p className="text-rose-500 text-sm font-bold mb-4 -mt-4">비밀번호가 일치하지 않습니다.</p>}
                        <div className="grid grid-cols-3 gap-4 max-w-[250px] mx-auto">
                            {[1, 2, 3, 4, 5, 6, 7, 8, 9].map((num) => (
                                <button key={num} onClick={() => handleNumberClick(num.toString())} className="w-16 h-16 text-2xl font-black text-stone-700 bg-stone-50 hover:bg-stone-100 rounded-full active:scale-95 transition-all mx-auto flex items-center justify-center">{num}</button>
                            ))}
                            <div className="w-16 h-16"></div>
                            <button onClick={() => handleNumberClick('0')} className="w-16 h-16 text-2xl font-black text-stone-700 bg-stone-50 hover:bg-stone-100 rounded-full active:scale-95 transition-all mx-auto flex items-center justify-center">0</button>
                            <button onClick={handleDelete} className="w-16 h-16 text-stone-400 hover:text-stone-600 rounded-full active:scale-95 transition-all mx-auto flex items-center justify-center"><Icon name="delete" size={28} /></button>
                        </div>
                    </div>
                    
                    {step === 'LOGIN' && (
                        <div className="mt-8 flex flex-col items-center gap-5 w-full max-w-sm">
                            {/* 브라우저 alert 대신 앱 내부에 자연스럽게 나타나는 힌트 상자 */}
                            {visibleHint && showHelper && (
                                <div className="w-full p-4 bg-blue-50 border border-blue-200 text-blue-700 rounded-xl text-sm font-bold shadow-inner text-left break-keep mb-[-10px] transition-all">
                                    💡 힌트: {savedHint}
                                </div>
                            )}
                            <div className="flex justify-center w-full gap-3">
                                {showHelper && (
                                    <button onClick={() => setVisibleHint(!visibleHint)} className="flex-1 py-3 bg-white text-stone-600 font-bold text-sm rounded-xl border border-stone-200 hover:border-blue-300 hover:text-blue-600 shadow-sm flex justify-center items-center gap-2 transition-colors">
                                        <Icon name="help-circle" size={16}/> {visibleHint ? '힌트 닫기' : '힌트 확인'}
                                    </button>
                                )}
                                <button onClick={() => { setStep('CHANGE_PIN_AUTH'); setPin(''); setError(false); setShowHelper(false); setVisibleHint(false); }} className="flex-1 py-3 bg-white text-stone-600 font-bold text-sm rounded-xl border border-stone-200 hover:border-emerald-300 hover:text-emerald-600 shadow-sm flex justify-center items-center gap-2 transition-colors"><Icon name="key" size={16}/> PIN 변경하기</button>
                            </div>
                            {showHelper && (
                                <button onClick={handleResetApp} className="text-stone-400 font-bold text-xs underline underline-offset-4 hover:text-rose-500 transition-colors">도저히 기억나지 않으신가요? (앱 초기화)</button>
                            )}
                        </div>
                    )}

                    {(step === 'CHANGE_PIN_AUTH' || step === 'CHANGE_PIN_NEW') && (
                        <div className="mt-8 flex flex-col items-center gap-4 w-full max-w-sm">
                            {/* PIN 변경 화면의 힌트 상자 */}
                            {step === 'CHANGE_PIN_AUTH' && visibleHint && (
                                <div className="w-full p-4 bg-blue-50 border border-blue-200 text-blue-700 rounded-xl text-sm font-bold shadow-inner text-left break-keep transition-all">
                                    💡 힌트: {savedHint}
                                </div>
                            )}
                            {step === 'CHANGE_PIN_AUTH' && (
                                <button onClick={() => setVisibleHint(!visibleHint)} className="px-5 py-3 bg-white text-blue-600 font-bold text-sm rounded-xl border border-blue-200 hover:bg-blue-50 shadow-sm flex justify-center items-center gap-2 transition-colors w-full">
                                    <Icon name="help-circle" size={16}/> {visibleHint ? '힌트 닫기' : '현재 비밀번호 힌트 확인하기'}
                                </button>
                            )}
                            <button onClick={() => { setStep('LOGIN'); setPin(''); setError(false); setShowHelper(false); setVisibleHint(false); }} className="px-5 py-3 bg-white text-stone-500 font-bold text-sm rounded-xl border border-stone-200 hover:bg-stone-50 shadow-sm flex justify-center items-center gap-2 transition-colors w-full">변경 취소</button>
                            {step === 'CHANGE_PIN_AUTH' && showHelper && (
                                <button onClick={handleResetApp} className="text-stone-400 font-bold text-xs underline underline-offset-4 hover:text-rose-500 transition-colors mt-2">도저히 기억나지 않으신가요? (앱 초기화)</button>
                            )}
                        </div>
                    )}

                    {/* 앱 초기화 확인용 커스텀 모달 (window.confirm 대체) */}
                    {resetStep > 0 && (
                        <div className="fixed inset-0 bg-stone-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl text-center">
                                <div className="w-16 h-16 bg-rose-100 text-rose-600 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-inner">
                                    <Icon name="alert-triangle" size={32} />
                                </div>
                                <h3 className="text-xl font-black text-stone-800 mb-4">
                                    {resetStep === 1 ? '앱을 초기화하시겠습니까?' : '정말 데이터를 지우시겠습니까?'}
                                </h3>
                                <p className="text-stone-500 font-medium mb-8 text-sm break-keep leading-relaxed">
                                    {resetStep === 1 
                                        ? '🚨 경고: 앱을 초기화하면 기존의 모든 명렬표와 출결 데이터가 영구적으로 삭제됩니다!' 
                                        : '마지막 확인입니다. 이 작업은 되돌릴 수 없으며, 처음부터 다시 시작하게 됩니다.'}
                                </p>
                                <div className="flex gap-3">
                                    <button onClick={cancelReset} className="flex-1 py-3 bg-stone-100 text-stone-600 font-bold rounded-xl hover:bg-stone-200 transition-colors">취소</button>
                                    <button onClick={resetStep === 1 ? confirmReset1 : confirmReset2} className="flex-1 py-3 bg-rose-500 text-white font-bold rounded-xl hover:bg-rose-600 transition-colors shadow-sm">
                                        {resetStep === 1 ? '네, 초기화합니다' : '영구 삭제'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // --- 메인 애플리케이션 컴포넌트 ---
        function MainApp({ onLogout }) {
          const [isLoaded, setIsLoaded] = useState(false);
          const isLoadedRef = useRef(false);

          const [activeTab, setActiveTab] = useState('calendar');
          const [currentDate, setCurrentDate] = useState(new Date());
          const [selectedDate, setSelectedDate] = useState(null); 

          // 동기화되는 상태 데이터
          const [students, setStudents] = useState([]);
          const [attendance, setAttendance] = useState({});
          const [fieldTrips, setFieldTrips] = useState([]);
          const [counseling, setCounseling] = useState([]);
          const [todos, setTodos] = useState({});
          const [memos, setMemos] = useState({});
          const [holidays, setHolidays] = useState(INITIAL_HOLIDAYS);
          const [customEvents, setCustomEvents] = useState({});
          const [timetable, setTimetable] = useState(DEFAULT_TIMETABLE);
          const [evaluations, setEvaluations] = useState([]);
          const [maxFieldDays, setMaxFieldDays] = useState(15);
          const [docLink, setDocLink] = useState('https://school.use.go.kr/guyeong-e/M010404/view/3325138?');

          // UI 제어 상태
          const [rosterInput, setRosterInput] = useState('');
          const [isEventModalOpen, setIsEventModalOpen] = useState(false);
          const [isSettingsModalOpen, setIsSettingsModalOpen] = useState(false);
          const [selectedStudentForModal, setSelectedStudentForModal] = useState(null);
          const [selectedFtStudent, setSelectedFtStudent] = useState(null);
          const [selectedFtEvent, setSelectedFtEvent] = useState(null);
          const [ftForm, setFtForm] = useState({ studentId: '', startDate: '', startTime: '00:00', endDate: '', place: '', isNeisDone: false });
          const [dmDrafts, setDmDrafts] = useState({}); 
          const [dmMemoText, setDmMemoText] = useState('');
          const [dmShowMonthEval, setDmShowMonthEval] = useState(false);
          const [isEditingLink, setIsEditingLink] = useState(false);
          const [tempLink, setTempLink] = useState('');
          
          // 학사일정 편집 모달 상태
          const [evDate, setEvDate] = useState('');
          const [evName, setEvName] = useState('');
          const [evType, setEvType] = useState('event');

          const fileInputRef = useRef(null);
          const backupInputRef = useRef(null);

          // 로컬 데이터(LocalStorage) 최초 불러오기
          useEffect(() => {
            const savedData = localStorage.getItem('tm_local_data');
            if (savedData) {
                try {
                    const data = JSON.parse(savedData);
                    setStudents(data.students || []); setAttendance(data.attendance || {}); setFieldTrips(data.fieldTrips || []);
                    setCounseling(data.counseling || []); setTodos(data.todos || {}); setMemos(data.memos || {});
                    setHolidays(data.holidays || INITIAL_HOLIDAYS); setCustomEvents(data.customEvents || {});
                    setTimetable(data.timetable || DEFAULT_TIMETABLE); setEvaluations(data.evaluations || []);
                    setMaxFieldDays(data.maxFieldDays || 15); setDocLink(data.docLink || 'https://school.use.go.kr/guyeong-e/M010404/view/3325138?');
                } catch (e) { console.error("데이터 로드 실패:", e); }
            }
            setIsLoaded(true);
            isLoadedRef.current = true;
          }, []);

          // 로컬 데이터 실시간 백그라운드 저장
          useEffect(() => {
            if (!isLoadedRef.current) return;
            const dataToSave = { students, attendance, fieldTrips, counseling, todos, memos, holidays, customEvents, timetable, evaluations, maxFieldDays, docLink };
            localStorage.setItem('tm_local_data', JSON.stringify(dataToSave));
          }, [students, attendance, fieldTrips, counseling, todos, memos, holidays, customEvents, timetable, evaluations, maxFieldDays, docLink]);

          useEffect(() => { if (rosterInput === '' && students.length > 0) setRosterInput(students.map(s => s.name).join('\n')); }, [students]);
          useEffect(() => { setDmMemoText(selectedDate ? (memos[selectedDate] || '') : ''); }, [selectedDate, memos]);

          const firstDayOfMonth = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1);
          const lastDayOfMonth = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0);
          const startDayIndex = firstDayOfMonth.getDay();
          const daysInMonth = lastDayOfMonth.getDate();
          const prevMonth = () => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1));
          const nextMonth = () => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1));

          const calculateDeadline = (startDateStr) => {
              if (!startDateStr) return '';
              let date = new Date(startDateStr); let count = 0;
              while (count < 4) {
                  date.setDate(date.getDate() - 1);
                  const day = date.getDay(); const dStr = getFormatDate(date);
                  if (!(day === 0 || day === 6) && !holidays[dStr]) count++;
              }
              return getFormatDate(date);
          };
          const calculateReportDeadline = (endDateStr) => {
              if (!endDateStr) return ''; let date = new Date(endDateStr); date.setDate(date.getDate() + 7); return getFormatDate(date);
          };
          const calculateDuration = (start, end, time) => {
              if (!start || !end) return 0;
              const diffDays = Math.ceil((new Date(end).getTime() - new Date(start).getTime()) / (1000 * 60 * 60 * 24)) + 1;
              if (diffDays <= 0) return 0;
              return time === '12:20' ? diffDays - 0.5 : diffDays;
          };

          const studentStats = useMemo(() => {
            const stats = {};
            students.forEach(s => { stats[s.id] = { absent: 0, early: 0, late: 0, missed: 0, period: 0, recognized: 0, field: 0, ftCount: 0, ftRecords: [] }; });
            Object.values(attendance).forEach(dayRecords => {
              dayRecords.forEach(record => {
                if (stats[record.studentId]) {
                  const sType = record.subType;
                  if (sType === '생리') {
                    stats[record.studentId].period++;
                  } else {
                    if (record.type === '결석') {
                      if (sType === '감염병' || sType === '경조사') {
                        stats[record.studentId].recognized++;
                      } else {
                        stats[record.studentId].absent++;
                      }
                    } else if (record.type === '조퇴') {
                      stats[record.studentId].early++;
                    } else if (record.type === '지각') {
                      stats[record.studentId].late++;
                    } else if (record.type === '결과') {
                      stats[record.studentId].missed++;
                    }
                  }
                }
              });
            });
            fieldTrips.forEach(ft => {
               if (stats[ft.studentId]) { stats[ft.studentId].field += ft.duration; stats[ft.studentId].ftCount++; stats[ft.studentId].ftRecords.push(ft); }
            });
            return stats;
          }, [students, attendance, fieldTrips]);

          // --- 데이터 백업 및 복구 핸들러 ---
          const handleDownloadBackup = () => {
              const data = localStorage.getItem('tm_local_data');
              if (!data) return alert('저장된 데이터가 없습니다.');
              const blob = new Blob([data], { type: 'application/json' });
              const url = URL.createObjectURL(blob);
              const a = document.createElement('a');
              a.href = url;
              a.download = `TeachersMate_통합백업_${getFormatDate(new Date())}.json`;
              a.click();
              URL.revokeObjectURL(url);
          };

          const handleUploadBackup = (e) => {
              const file = e.target.files[0];
              if (!file) return;
              const reader = new FileReader();
              reader.onload = (evt) => {
                  try {
                      const parsed = JSON.parse(evt.target.result);
                      if (parsed && typeof parsed === 'object' && Array.isArray(parsed.students)) {
                          localStorage.setItem('tm_local_data', JSON.stringify(parsed));
                          alert('✅ 데이터 복구가 완료되었습니다!\n모든 데이터가 완벽하게 복원되었습니다. 앱을 새로고침합니다.');
                          window.location.reload();
                      } else {
                          throw new Error("Invalid format");
                      }
                  } catch (err) {
                      alert('🚨 올바른 백업 파일(.json)이 아닙니다. 파일을 다시 확인해주세요.');
                  }
                  e.target.value = ''; // 초기화
              };
              reader.readAsText(file);
          };

          // --- 달력 기록 스프레드시트 내보내기 ---
          const handleExportCalendarToSheets = () => {
              const allDatesSet = new Set([
                  ...Object.keys(memos), ...Object.keys(todos), ...Object.keys(holidays), ...Object.keys(customEvents)
              ]);
              const sortedDates = Array.from(allDatesSet).sort();

              const headers = ['날짜', '요일', '학사일정', '일일 메모', '할 일'];
              const data = sortedDates.map(dateStr => {
                  const d = new Date(dateStr);
                  const dayStr = ['일','월','화','수','목','금','토'][d.getDay()];
                  const event = holidays[dateStr] || customEvents[dateStr] || '-';
                  const memo = memos[dateStr] || '-';
                  const dayTodos = todos[dateStr] || [];
                  const todoList = dayTodos.length > 0 ? dayTodos.map(t => `[${t.done ? 'O' : 'X'}] ${t.text}`).join('\n') : '-';
                  
                  if (event === '-' && memo === '-' && todoList === '-') return null;
                  return [dateStr, dayStr, event, memo, todoList];
              }).filter(Boolean);

              if (data.length === 0) return alert('내보낼 달력 기록(일정, 메모, 할일)이 없습니다.');
              exportToGoogleSheets(headers, data, '학사달력_기록');
          };

          const renderCalendar = () => {
            const days = []; const todayStr = getFormatDate(new Date());
            for (let i = 0; i < startDayIndex; i++) days.push(<div key={`empty-${i}`} className="h-24 bg-stone-50/50 border border-stone-100 rounded-2xl"></div>);
            
            for (let d = 1; d <= daysInMonth; d++) {
              const dateObj = new Date(currentDate.getFullYear(), currentDate.getMonth(), d);
              const dateStr = getFormatDate(dateObj);
              const dayOfWeek = dateObj.getDay();
              const holiday = holidays[dateStr];
              const customEvent = customEvents[dateStr];
              const hasTodo = todos[dateStr]?.some(t => !t.done);
              const hasMemo = memos[dateStr]?.trim().length > 0;
              const hasAttendance = attendance[dateStr]?.length > 0;
              const hasCounseling = counseling.some(c => c.date === dateStr);
              const hasFieldTrip = fieldTrips.some(ft => dateStr >= ft.startDate && dateStr <= ft.endDate);
              const isToday = dateStr === todayStr;

              days.push(
                <div key={d} onClick={() => { setSelectedDate(dateStr); setDmShowMonthEval(false); }}
                  className={`h-28 border rounded-2xl p-3 cursor-pointer transition-all hover:border-emerald-400 hover:shadow-md flex flex-col justify-between
                    ${isToday ? 'bg-emerald-50/80 border-emerald-400 shadow-sm' : (dayOfWeek === 0 || holiday) ? 'bg-rose-50/40 border-stone-100' : dayOfWeek === 6 ? 'bg-sky-50/40 border-stone-100' : 'bg-white border-stone-100'}`}
                >
                  <div>
                    <div className="flex justify-between items-start">
                      <span className={`font-bold ${isToday ? 'text-emerald-600' : dayOfWeek === 0 || holiday ? 'text-rose-400' : dayOfWeek === 6 ? 'text-sky-400' : 'text-stone-600'}`}>{d}</span>
                      <div className="flex gap-1 flex-wrap justify-end max-w-[50%]">
                        {hasTodo && <span className="w-2 h-2 rounded-full bg-emerald-400" title="할 일" />}
                        {hasMemo && <span className="w-2 h-2 rounded-full bg-amber-400" title="메모" />}
                        {hasAttendance && <span className="w-2 h-2 rounded-full bg-rose-400" title="출결" />}
                        {hasFieldTrip && <span className="w-2 h-2 rounded-full bg-blue-500" title="교외체험" />}
                        {hasCounseling && <span className="w-2 h-2 rounded-full bg-sky-400" title="상담" />}
                      </div>
                    </div>
                    {(holiday || customEvent) && (
                      <div className="mt-1.5 flex flex-col gap-1">
                        {holiday && <span className="text-[10px] px-1.5 py-0.5 bg-rose-100/80 text-rose-600 rounded-md truncate font-semibold">{holiday}</span>}
                        {customEvent && <span className="text-[10px] px-1.5 py-0.5 bg-emerald-100/80 text-emerald-700 rounded-md truncate font-semibold">{customEvent}</span>}
                      </div>
                    )}
                  </div>
                </div>
              );
            }
            return days;
          };

          const renderFieldTrip = () => {
            const handleFormChange = (e) => {
                const { name, value, type, checked } = e.target;
                setFtForm(prev => {
                    const next = { ...prev, [name]: type === 'checkbox' ? checked : value };
                    if (name === 'startDate' && (!next.endDate || next.endDate < value)) next.endDate = value;
                    return next;
                });
            };

            const previewDuration = calculateDuration(ftForm.startDate, ftForm.endDate, ftForm.startTime);
            const deadline = calculateDeadline(ftForm.startDate);
            const reportDeadline = calculateReportDeadline(ftForm.endDate);

            const handleAddFieldTripForm = () => {
                if (!ftForm.studentId || !ftForm.startDate || !ftForm.endDate) return alert('학생과 날짜를 모두 입력해주세요.');
                const newRecord = { id: Date.now(), ...ftForm, duration: previewDuration, deadline, reportDeadline, isNeisRequested: ftForm.isNeisDone, isAppReceived: false, isReportDone: false };
                setFieldTrips([...fieldTrips, newRecord]);
                setFtForm({ studentId: '', startDate: '', startTime: '00:00', endDate: '', place: '', isNeisDone: false });
            };

            const updateFtInfo = (id, key, value) => {
                setFieldTrips(prev => prev.map(ft => ft.id === id ? { ...ft, [key]: value } : ft));
                if (selectedFtEvent && selectedFtEvent.id === id) setSelectedFtEvent(prev => ({ ...prev, [key]: value }));
            };

            const handleExportFT = () => {
                const headers = ['번호', '이름', '총 사용 일수', '잔여 일수', '신청 횟수', '최근 체험학습일'];
                const data = [...students].sort((a,b)=>a.number - b.number).map(s => {
                    const stats = studentStats[s.id];
                    const remaining = maxFieldDays - stats.field;
                    const recentDate = stats.ftRecords.length > 0 ? [...stats.ftRecords].sort((a,b)=>b.startDate.localeCompare(a.startDate))[0].startDate : '-';
                    return [s.number, s.name, stats.field, remaining, stats.ftCount, recentDate];
                });
                exportToExcel('교외체험_누적명부.xlsx', headers, data);
            };

            const handleExportToSheetsFT = () => {
                const headers = ['번호', '이름', '총 사용 일수', '잔여 일수', '신청 횟수', '최근 체험학습일'];
                const data = [...students].sort((a,b)=>a.number - b.number).map(s => {
                    const stats = studentStats[s.id];
                    const remaining = maxFieldDays - stats.field;
                    const recentDate = stats.ftRecords.length > 0 ? [...stats.ftRecords].sort((a,b)=>b.startDate.localeCompare(a.startDate))[0].startDate : '-';
                    return [s.number, s.name, stats.field, remaining, stats.ftCount, recentDate];
                });
                exportToGoogleSheets(headers, data, '교외체험_누적명부');
            };

            return (
              <div className="flex flex-col lg:flex-row gap-6">
                <aside className="w-full lg:w-80 flex flex-col gap-5 flex-none">
                  <div className="bg-white p-6 rounded-3xl shadow-sm border border-stone-100">
                      <h2 className="font-bold text-lg mb-5 flex items-center gap-2 text-emerald-700"><Icon name="plus-circle" /><span>신규 체험학습 등록</span></h2>
                      <div className="space-y-4">
                          <select name="studentId" value={ftForm.studentId} onChange={handleFormChange} className="w-full p-3.5 bg-stone-50 rounded-xl outline-none text-sm font-bold text-stone-700">
                              <option value="">학생을 선택하세요</option>
                              {[...students].sort((a,b)=>a.number - b.number).map(s => <option key={s.id} value={s.id}>{s.number}번 {s.name}</option>)}
                          </select>
                          <div className="grid grid-cols-1 gap-3">
                              <div>
                                  <label className="text-xs font-bold text-stone-400 ml-1 mb-1 block">시작일 및 시간</label>
                                  <div className="flex gap-1.5">
                                      <input type="date" name="startDate" value={ftForm.startDate} onChange={handleFormChange} className="flex-1 p-3 bg-stone-50 rounded-xl text-sm" />
                                      <select name="startTime" value={ftForm.startTime} onChange={handleFormChange} className="w-28 p-3 bg-stone-50 rounded-xl text-xs font-bold">
                                          <option value="00:00">오전 00:00</option><option value="12:20">오후 12:20</option>
                                      </select>
                                  </div>
                              </div>
                              <div>
                                  <label className="text-xs font-bold text-stone-400 ml-1 mb-1 block">종료일</label>
                                  <input type="date" name="endDate" value={ftForm.endDate} onChange={handleFormChange} className="w-full p-3 bg-stone-50 rounded-xl text-sm" />
                              </div>
                          </div>
                          {ftForm.startDate && ftForm.endDate && (<div className="text-center bg-emerald-50 p-2.5 rounded-xl text-emerald-700 text-sm font-bold border border-emerald-100">총 체험 기간: {previewDuration}일</div>)}
                          <input name="place" value={ftForm.place} onChange={handleFormChange} placeholder="장소 및 간단한 내용" className="w-full p-3.5 bg-stone-50 rounded-xl text-sm" />
                          <label className="flex items-center gap-2 px-1 cursor-pointer">
                              <input type="checkbox" name="isNeisDone" checked={ftForm.isNeisDone} onChange={handleFormChange} className="w-4 h-4 accent-emerald-500" />
                              <span className="text-sm font-bold text-stone-600">NEIS학부모서비스</span>
                          </label>
                          <div className="grid grid-cols-2 gap-3 mt-2">
                              <div className="p-3 bg-rose-50 rounded-xl border border-rose-100 text-center"><div className="text-xs font-bold text-rose-400 mb-1">신청 마감일</div><div className="text-base font-black text-rose-600">{deadline || '-'}</div></div>
                              <div className="p-3 bg-blue-50 rounded-xl border border-blue-100 text-center"><div className="text-xs font-bold text-blue-400 mb-1">보고 마감일</div><div className="text-base font-black text-blue-600">{reportDeadline || '-'}</div></div>
                          </div>
                          <button onClick={handleAddFieldTripForm} className="w-full py-4 bg-emerald-600 text-white rounded-xl font-bold hover:bg-emerald-700 transition shadow-sm mt-2 flex justify-center items-center gap-2"><Icon name="check" size={18} /> 체험학습 등록</button>
                      </div>
                  </div>
                  <div className="bg-white p-6 rounded-3xl shadow-sm border border-stone-100 overflow-hidden flex flex-col flex-1 min-h-[250px] max-h-[350px]">
                      <h2 className="font-bold text-lg mb-4 text-stone-700 flex items-center gap-2"><Icon name="clock" size={18} className="text-emerald-500"/> 최근 등록된 일정</h2>
                      <div className="overflow-y-auto space-y-3 pr-1 scrollbar-hide">
                          {fieldTrips.length === 0 ? <p className="text-stone-400 text-center py-8 text-sm">등록된 일정이 없습니다.</p> :
                          [...fieldTrips].sort((a,b)=>b.id - a.id).map(ft => {
                              const st = students.find(s=>s.id === ft.studentId);
                              return (
                              <div key={ft.id} onClick={() => setSelectedFtEvent(ft)} className="p-4 bg-stone-50 rounded-2xl border border-transparent hover:border-emerald-200 cursor-pointer transition-all">
                                  <div className="flex justify-between items-center mb-1"><div className="font-extrabold text-stone-700">{st?.name}</div><span className="text-xs bg-blue-100 text-blue-700 px-2 py-0.5 rounded-lg font-bold">{ft.duration}일</span></div>
                                  <div className="text-xs text-stone-500 font-medium">{ft.startDate.slice(5)} ~ {ft.endDate.slice(5)} ({ft.startTime === '12:20' ? '오후' : '오전'})</div>
                              </div>
                          )})}
                      </div>
                  </div>
                </aside>

                <section className="flex-1 bg-white rounded-3xl shadow-sm border border-stone-100 flex flex-col overflow-hidden min-h-[500px]">
                  <div className="p-6 border-b border-stone-100 flex flex-col gap-4 bg-stone-50/50">
                      <div className="flex justify-between items-start">
                          <div>
                              <h2 className="text-xl font-bold text-stone-800 flex items-center gap-2"><Icon name="bus" size={24} className="text-emerald-500" /> 학생별 체험학습 누적 명부</h2>
                              <p className="text-sm text-stone-500 mt-1">좌측에서 등록된 내역이 이곳과 <strong>출결 통계</strong>에 연동되어 자동 합산됩니다.</p>
                          </div>
                          <div className="flex gap-2">
                             <button onClick={handleExportFT} className="px-3 py-2 bg-emerald-50 text-emerald-700 border border-emerald-200 rounded-xl hover:bg-emerald-100 font-bold transition-colors text-sm flex items-center shadow-sm gap-1.5"><Icon name="download" size={16} /> 엑셀 다운로드</button>
                             <button onClick={handleExportToSheetsFT} className="px-3 py-2 bg-blue-50 text-blue-700 border border-blue-200 rounded-xl hover:bg-blue-100 font-bold transition-colors text-sm flex items-center shadow-sm gap-1.5" title="이 버튼을 한 번 클릭하고 빈 스프레드시트가 나타났을 때 *Ctrl + V (붙여넣기)*만 하시면 그동안 기록된 표가 구글 스프레드시트에 완벽한 형태로 쏙 들어갑니다!"><Icon name="copy" size={16} /> 스프레드시트로 내보내기</button>
                          </div>
                      </div>
                      <div className="flex items-center">
                          <div className="bg-white border border-stone-200 rounded-xl px-4 py-2 text-sm text-stone-600 font-medium flex items-center gap-2">
                              연간 규정: <input type="number" value={maxFieldDays} onChange={(e) => setMaxFieldDays(Number(e.target.value) || 0)} className="w-14 text-center font-bold text-emerald-600 text-lg bg-emerald-50 border border-emerald-100 rounded-lg outline-none" min="0"/>
                              <span className="font-bold text-emerald-600 text-lg">일</span>
                          </div>
                      </div>
                  </div>
                  
                  <div className="overflow-x-auto flex-1">
                      <table className="w-full text-left border-collapse min-w-[600px]">
                          <thead>
                              <tr className="bg-stone-50/50 border-b border-stone-100 text-stone-500 text-sm">
                                  <th className="p-4 font-bold pl-6">학생 이름</th>
                                  <th className="p-4 font-bold text-center">총 사용 일수</th>
                                  <th className="p-4 font-bold text-center">잔여 일수</th>
                                  <th className="p-4 font-bold text-center">신청 횟수</th>
                                  <th className="p-4 font-bold text-center">최근 체험학습일</th>
                              </tr>
                          </thead>
                          <tbody>
                              {students.length === 0 ? (
                                  <tr><td colSpan="5" className="p-10 text-center text-stone-400 font-medium">명렬표를 먼저 입력해주세요.</td></tr>
                              ) : [...students].sort((a,b)=>a.number - b.number).map(student => {
                                  const stats = studentStats[student.id]; const remaining = maxFieldDays - stats.field; const isWarning = remaining <= 5;
                                  return (
                                      <tr key={student.id} onClick={() => setSelectedFtStudent(student.id)} className="border-b border-stone-50 hover:bg-stone-50/80 transition-colors cursor-pointer">
                                          <td className="p-4 pl-6"><span className="font-bold text-stone-800 text-base flex items-center"><span className="text-stone-400 font-medium w-6 text-sm">{student.number}.</span>{student.name}</span></td>
                                          <td className="p-4 text-center"><span className="font-black text-blue-600 text-lg">{stats.field}</span><span className="text-stone-400 text-sm ml-1">일</span></td>
                                          <td className="p-4 text-center"><span className={`font-bold px-3 py-1.5 rounded-xl text-sm ${remaining < 0 ? 'bg-rose-500 text-white shadow-sm' : isWarning ? 'bg-rose-50 text-rose-600 border border-rose-100' : 'bg-stone-100 text-stone-600'}`}>{remaining}일</span></td>
                                          <td className="p-4 text-center text-stone-500 font-medium">{stats.ftCount}회</td>
                                          <td className="p-4 text-center text-sm text-stone-400 font-medium">{stats.ftRecords.length > 0 ? [...stats.ftRecords].sort((a,b)=>b.startDate.localeCompare(a.startDate))[0].startDate : '-'}</td>
                                      </tr>
                                  );
                              })}
                          </tbody>
                      </table>
                  </div>
                </section>
              </div>
            );
          };

          const renderRosterSetup = () => {
              const handleSaveRoster = () => {
                  const names = rosterInput.split('\n').map(n => n.trim()).filter(n => n !== '');
                  const newStudents = names.map((name, idx) => {
                      const existing = students[idx];
                      return existing ? { ...existing, name, number: idx + 1 } : { id: `s${Date.now()}_${idx}`, number: idx + 1, name };
                  });
                  setStudents(newStudents);
                  alert('명렬표가 성공적으로 저장 및 반영되었습니다.');
              };

              return (
                  <div className="w-full">
                      <div className="bg-white rounded-3xl shadow-sm border border-stone-100 p-8">
                          <h2 className="text-2xl font-black flex items-center gap-2 text-stone-700 mb-2"><Icon name="list-ordered" className="text-emerald-500" size={28} /><span>초기 명렬표 일괄 설정</span></h2>
                          <p className="text-stone-500 mb-6 font-medium">우리 반 학생 이름을 번호순으로 <strong className="text-emerald-600">한 줄에 한 명씩</strong> 엑셀에서 복사해 붙여넣으세요. <br/>입력된 순서대로 번호가 자동 부여되며, 모든 탭(출결, 상담 등)에 즉시 적용됩니다.</p>
                          <textarea value={rosterInput} onChange={(e) => setRosterInput(e.target.value)} placeholder="예시)&#10;김철수&#10;이영희&#10;박민수" className="w-full h-96 p-5 bg-stone-50 border border-stone-100 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-200 transition-all mb-6 resize-none text-base font-bold text-stone-700 shadow-inner"></textarea>
                          <button onClick={handleSaveRoster} className="w-full py-4 bg-emerald-600 text-white font-bold text-lg rounded-2xl hover:bg-emerald-700 active:scale-95 transition-all shadow-sm flex justify-center items-center gap-2"><Icon name="save" size={20} />명렬표 저장 및 반영</button>
                      </div>
                  </div>
              );
          };

          const renderRoster = () => {
            const handleExport = () => {
              const headers = ['번호', '이름', '결석', '조퇴', '지각', '결과', '생출', '인정', '교외체험'];
              const data = [...students].sort((a,b)=>a.number - b.number).map(s => [
                s.number, s.name, studentStats[s.id].absent, studentStats[s.id].early, studentStats[s.id].late, studentStats[s.id].missed, studentStats[s.id].period, studentStats[s.id].recognized, studentStats[s.id].field
              ]);
              exportToExcel('출결통계.xlsx', headers, data);
            };

            const handleExportToSheetsRoster = () => {
                const headers = ['번호', '이름', '결석', '조퇴', '지각', '결과', '생출', '인정', '교외체험'];
                const data = [...students].sort((a,b)=>a.number - b.number).map(s => [
                  s.number, s.name, studentStats[s.id].absent, studentStats[s.id].early, studentStats[s.id].late, studentStats[s.id].missed, studentStats[s.id].period, studentStats[s.id].recognized, studentStats[s.id].field
                ]);
                exportToGoogleSheets(headers, data, '출결통계');
            };

            const updateStudent = (id, field, value) => setStudents(students.map(s => s.id === id ? { ...s, [field]: value } : s));
            const removeStudent = (id) => { if(window.confirm('학생을 삭제하시겠습니까? 관련 기록은 유지되나 명단에서 보이지 않습니다.')) setStudents(students.filter(s => s.id !== id)); };

            return (
              <div className="p-6 bg-white rounded-3xl shadow-sm border border-stone-100">
                <div className="flex justify-between items-start mb-6">
                  <h2 className="text-xl font-bold text-stone-700 flex items-center mt-1"><Icon name="users" size={24} className="mr-2 text-emerald-500"/> 출결 통계</h2>
                  <div className="flex flex-col gap-2 items-end">
                    <div className="flex gap-2">
                      <button onClick={handleExport} className="px-3 py-2 bg-emerald-50 text-emerald-700 border border-emerald-200 rounded-xl hover:bg-emerald-100 font-bold transition-colors text-sm flex items-center shadow-sm gap-1.5"><Icon name="download" size={16} /> 엑셀 다운로드</button>
                      <button onClick={handleExportToSheetsRoster} className="px-3 py-2 bg-blue-50 text-blue-700 border border-blue-200 rounded-xl hover:bg-blue-100 font-bold transition-colors text-sm flex items-center shadow-sm gap-1.5" title="이 버튼을 한 번 클릭하고 빈 스프레드시트가 나타났을 때 *Ctrl + V (붙여넣기)*만 하시면 그동안 기록된 표가 구글 스프레드시트에 완벽한 형태로 쏙 들어갑니다!"><Icon name="copy" size={16} /> 스프레드시트로 내보내기</button>
                    </div>
                  </div>
                </div>
                
                <p className="text-sm text-stone-400 mb-4">* 학생 행을 클릭하면 상세 출결 기록을 볼 수 있습니다. (교외체험은 '교외체험 매니저' 탭에서 관리됩니다.)</p>

                <div className="overflow-x-auto rounded-2xl border border-stone-100">
                  <table className="w-full text-left border-collapse min-w-[900px]">
                    <thead>
                      <tr className="bg-stone-50 border-b border-stone-100 text-stone-500 text-sm">
                        <th className="p-4 w-12 text-center font-bold">번호</th><th className="p-4 font-bold">이름</th><th className="p-4 w-16 text-center text-rose-500 font-bold">결석</th><th className="p-4 w-16 text-center text-amber-500 font-bold">조퇴</th><th className="p-4 w-16 text-center text-indigo-500 font-bold">지각</th><th className="p-4 w-16 text-center text-violet-500 font-bold">결과</th><th className="p-2 w-20 text-center text-pink-500 font-bold leading-tight">생출<br/><span className="text-[11px] font-medium tracking-tighter opacity-80">(생리출결)</span></th><th className="p-2 w-24 text-center text-teal-500 font-bold leading-tight whitespace-nowrap">인정<br/><span className="text-[11px] font-medium tracking-tighter opacity-80">(감염병,경조사)</span></th><th className="p-4 w-24 text-center text-blue-500 font-bold whitespace-nowrap">교외체험</th><th className="p-4 w-20 text-center font-bold">관리</th>
                      </tr>
                    </thead>
                    <tbody>
                      {[...students].sort((a,b)=>a.number - b.number).map(student => (
                        <tr key={student.id} onClick={() => setSelectedStudentForModal(student.id)} className="border-b border-stone-50 hover:bg-stone-50/50 transition-colors cursor-pointer">
                          <td className="p-2 text-center" onClick={e => e.stopPropagation()}><input type="number" value={student.number} onChange={(e) => updateStudent(student.id, 'number', Number(e.target.value))} className="w-12 text-center bg-transparent border-b-2 border-transparent hover:border-stone-300 focus:border-emerald-400 focus:outline-none transition-colors" /></td>
                          <td className="p-2" onClick={e => e.stopPropagation()}><input type="text" value={student.name} placeholder="이름 입력" onChange={(e) => updateStudent(student.id, 'name', e.target.value)} className="w-full bg-transparent border-b-2 border-transparent hover:border-stone-300 focus:border-emerald-400 focus:outline-none px-2 py-1 transition-colors font-bold" /></td>
                          <td className="p-4 text-center bg-rose-50/30 font-bold text-rose-600">{studentStats[student.id]?.absent || 0}</td><td className="p-4 text-center bg-amber-50/30 font-bold text-amber-600">{studentStats[student.id]?.early || 0}</td><td className="p-4 text-center bg-indigo-50/30 font-bold text-indigo-600">{studentStats[student.id]?.late || 0}</td><td className="p-4 text-center bg-violet-50/30 font-bold text-violet-600">{studentStats[student.id]?.missed || 0}</td><td className="p-4 text-center bg-pink-50/30 font-bold text-pink-600">{studentStats[student.id]?.period || 0}</td><td className="p-4 text-center bg-teal-50/30 font-bold text-teal-600">{studentStats[student.id]?.recognized || 0}</td><td className="p-4 text-center bg-blue-50/30 font-bold text-blue-600">{studentStats[student.id]?.field || 0}</td>
                          <td className="p-4 text-center space-x-3" onClick={e => e.stopPropagation()}>
                            <button onClick={() => setSelectedStudentForModal(student.id)} className="text-stone-300 hover:text-emerald-500 transition-colors"><Icon name="search" size={18} /></button>
                            <button onClick={() => removeStudent(student.id)} className="text-stone-300 hover:text-rose-400 transition-colors"><Icon name="trash-2" size={18} /></button>
                          </td>
                        </tr>
                      ))}
                      {students.length === 0 && (<tr><td colSpan="10" className="text-center p-10 text-stone-400 font-medium">아래 '명렬표 일괄 설정'을 통해 학생을 추가해주세요.</td></tr>)}
                    </tbody>
                  </table>
                </div>
              </div>
            );
          };

          const renderCounseling = () => {
            const handleExport = () => {
              const headers = ['일시', '학생명', '상담내용'];
              const data = counseling.map(c => {
                const student = students.find(s => s.id === c.studentId);
                return [c.date, student ? student.name : '알수없음', c.content];
              });
              exportToExcel('상담일지.xlsx', headers, data);
            };

            const handleExportToSheetsCounseling = () => {
                const headers = ['일시', '학생명', '상담내용'];
                const data = counseling.map(c => {
                  const student = students.find(s => s.id === c.studentId);
                  return [c.date, student ? student.name : '알수없음', c.content];
                });
                exportToGoogleSheets(headers, data, '상담일지');
            };

            const deleteCounseling = (id) => { if(window.confirm('기록을 삭제하시겠습니까?')) setCounseling(counseling.filter(c => c.id !== id)); };
            const sortedCounseling = [...counseling].sort((a,b) => new Date(b.date) - new Date(a.date));

            return (
              <div className="p-6 bg-white rounded-3xl shadow-sm border border-stone-100">
                <div className="flex justify-between items-start mb-6">
                  <h2 className="text-xl font-bold text-stone-700 flex items-center mt-1"><Icon name="book-open" size={24} className="mr-2 text-emerald-500"/> 학생 상담 일지</h2>
                  <div className="flex flex-col gap-2 items-end">
                    <div className="flex gap-2">
                      <button onClick={handleExport} className="px-3 py-2 bg-emerald-50 text-emerald-700 border border-emerald-200 rounded-xl hover:bg-emerald-100 font-bold transition-colors text-sm flex items-center shadow-sm gap-1.5"><Icon name="download" size={16} /> 엑셀 다운로드</button>
                      <button onClick={handleExportToSheetsCounseling} className="px-3 py-2 bg-blue-50 text-blue-700 border border-blue-200 rounded-xl hover:bg-blue-100 font-bold transition-colors text-sm flex items-center shadow-sm gap-1.5" title="이 버튼을 한 번 클릭하고 빈 스프레드시트가 나타났을 때 *Ctrl + V (붙여넣기)*만 하시면 그동안 기록된 표가 구글 스프레드시트에 완벽한 형태로 쏙 들어갑니다!"><Icon name="copy" size={16} /> 스프레드시트로 내보내기</button>
                    </div>
                  </div>
                </div>

                <div className="grid gap-4">
                  {sortedCounseling.length === 0 ? (
                    <div className="text-center p-12 text-stone-400 border border-dashed border-stone-200 rounded-2xl bg-stone-50/50 font-medium">달력의 각 날짜 칸을 클릭하여 상담 내용을 추가할 수 있습니다.</div>
                  ) : (
                    sortedCounseling.map(record => {
                      const student = students.find(s => s.id === record.studentId);
                      return (
                        <div key={record.id} className="border border-stone-100 p-5 rounded-2xl hover:shadow-md transition-shadow bg-white">
                          <div className="flex justify-between items-center mb-3">
                            <div className="flex items-center gap-3"><span className="bg-emerald-50 text-emerald-600 px-3 py-1.5 rounded-lg text-sm font-bold">{record.date}</span><span className="font-extrabold text-lg text-stone-700">{student ? student.name : '삭제된 학생'}</span></div>
                            <button onClick={() => deleteCounseling(record.id)} className="text-stone-300 hover:text-rose-400 transition-colors p-2"><Icon name="trash-2" size={18}/></button>
                          </div>
                          <p className="text-stone-600 whitespace-pre-wrap leading-relaxed">{record.content}</p>
                        </div>
                      );
                    })
                  )}
                </div>
              </div>
            );
          };

          const renderTimetable = () => {
            const days = ['월', '화', '수', '목', '금'];
            const updateSubject = (dayIndex, periodIndex, val) => {
              setTimetable(prev => { const newTable = { ...prev }; newTable[dayIndex] = [...prev[dayIndex]]; newTable[dayIndex][periodIndex] = val; return newTable; });
            };
            return (
              <div className="p-6 bg-white rounded-3xl shadow-sm border border-stone-100">
                <h2 className="text-xl font-bold text-stone-700 flex items-center mb-6"><Icon name="clock" size={24} className="mr-2 text-emerald-500"/> 기초시간표 설정</h2>
                <div className="overflow-x-auto rounded-2xl border border-stone-100">
                  <table className="w-full text-center border-collapse">
                    <thead><tr className="bg-stone-50 border-b border-stone-100"><th className="p-4 w-16 border-r border-stone-100 text-stone-500 font-bold">교시</th>{days.map(day => <th key={day} className="p-4 font-bold text-stone-600">{day}</th>)}</tr></thead>
                    <tbody>
                      {Array(8).fill(0).map((_, periodIndex) => (
                        <tr key={periodIndex} className="border-b border-stone-50">
                          <td className="p-4 border-r border-stone-100 bg-stone-50/50 font-extrabold text-stone-400">{periodIndex + 1}</td>
                          {[1, 2, 3, 4, 5].map(dayIndex => (
                            <td key={dayIndex} className="p-2"><input type="text" value={timetable[dayIndex][periodIndex]} onChange={(e) => updateSubject(dayIndex, periodIndex, e.target.value)} className="w-full text-center p-2.5 rounded-xl hover:bg-stone-50 focus:bg-emerald-50 focus:outline-none transition-colors font-bold text-stone-700" placeholder="-"/></td>
                          ))}
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            );
          };

          const renderEvaluation = () => {
            const updateEval = (id, field, val) => setEvaluations(evaluations.map(e => e.id === id ? { ...e, [field]: val } : e));
            const deleteEval = (id) => { if(window.confirm('항목을 삭제하시겠습니까?')) setEvaluations(evaluations.filter(e => e.id !== id)); }

            const handleDownloadTemplate = () => {
                const headers = ['실시여부', '과목', '단원명', '평가 요소', '영역', '시기', '평가 방법', '수업 방법 및 평가 주안점', '도구'];
                const data = [['미실시', '국어', '1. 비교하며 읽어요', '이야기 세계와 현실 비교하기', '문학', '3월 4주', '관찰법', '현실과 이야기의 차이점 찾기', '활동지']];
                exportToExcel('평가계획_업로드양식.xlsx', headers, data);
            };

            const handleExportToSheetsEvaluation = () => {
                const headers = ['학기', '실시완료', '과목', '단원', '평가 요소', '영역', '시기', '방법'];
                const data = evaluations.map(ev => [
                    ev.semester || '1학기',
                    ev.isDone ? 'O' : 'X',
                    ev.subject || '',
                    ev.unit || '',
                    ev.element || '',
                    ev.domain || '',
                    ev.period || '',
                    ev.method || ''
                ]);
                exportToGoogleSheets(headers, data, '평가계획_종합');
            };

            const getMonth = (periodStr) => {
                if (typeof periodStr !== 'string') return 0;
                const match = periodStr.match(/([1-9]|1[0-2])월/);
                return match ? parseInt(match[1], 10) : 0;
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const ws = XLSX.read(evt.target.result, { type: 'binary' }).Sheets[XLSX.read(evt.target.result, { type: 'binary' }).SheetNames[0]];
                    const data = XLSX.utils.sheet_to_json(ws);
                    const newEvals = data.map((row, idx) => {
                        const period = String(row['시기'] || '').trim(); const month = getMonth(period);
                        const semester = (month >= 3 && month <= 7) ? '1학기' : (month > 0 ? '2학기' : '1학기');
                        const isDone = ['실시', '완료', 'o', 'O', 'y', 'Y', 'true', 'TRUE', '실시완료'].includes(String(row['실시여부'] || row['완료여부'] || row['완료 여부'] || '').trim());
                        return { 
                            id: Date.now() + idx, 
                            isDone, 
                            subject: row['과목'] || '', 
                            unit: row['단원명'] || row['단원'] || '', 
                            element: row['평가 요소'] || row['평가요소'] || '', 
                            domain: row['영역'] || '', 
                            period, 
                            method: row['평가 방법'] || row['방법'] || row['도구'] || '', 
                            semester 
                        };
                    });
                    setEvaluations(prev => [...prev, ...newEvals]);
                    e.target.value = '';
                };
                reader.readAsBinaryString(file);
            };

            const renderTable = (semester, months) => {
                const semEvals = evaluations.filter(ev => (ev.semester || '1학기') === semester);
                return (
                  <div className="mb-10">
                    <h3 className="text-xl font-extrabold text-stone-700 flex items-center mb-4"><Icon name="bookmark" size={24} className="mr-2 text-emerald-500"/>{semester} 평가계획</h3>
                    <div className="overflow-x-auto rounded-2xl border border-stone-100 bg-white shadow-sm">
                      <table className="w-full text-left border-collapse min-w-[1200px]">
                        <thead><tr className="bg-stone-50 border-b border-stone-100 text-sm text-stone-500"><th className="p-3 w-20 text-center font-bold">실시</th><th className="p-3 w-28 font-bold">과목</th><th className="p-3 w-40 font-bold">단원</th><th className="p-3 font-bold">평가 요소</th><th className="p-3 w-28 font-bold">영역</th><th className="p-3 w-28 font-bold text-center">시기</th><th className="p-3 w-32 font-bold">방법</th><th className="p-3 w-16 text-center font-bold">삭제</th></tr></thead>
                        <tbody>
                          {months.map(m => {
                              const mEvals = semEvals.filter(ev => getMonth(ev.period) === m);
                              if (m === 0 && mEvals.length === 0) return null;
                              if (m !== 0 && mEvals.length === 0 && semEvals.length === 0) return null;

                              return (
                                  <React.Fragment key={`${semester}-${m}`}>
                                      <tr className="bg-emerald-50/60 border-y border-emerald-100"><td colSpan="8" className="p-3 font-extrabold text-emerald-800 text-base"><Icon name="calendar" size={16} className="inline-block mr-2 -mt-0.5 text-emerald-600"/>{m === 0 ? '시기 미지정 (또는 기타)' : `${m}월 평가계획`}</td></tr>
                                      {mEvals.length === 0 ? (<tr><td colSpan="8" className="p-4 text-center text-stone-400 text-sm font-medium bg-white">계획된 평가가 없습니다.</td></tr>) : (
                                          mEvals.map(ev => (
                                              <tr key={ev.id} className={`border-b transition-colors ${ev.isDone ? 'bg-emerald-50/60 border-emerald-200' : 'bg-white border-stone-50 hover:bg-stone-50/50'}`}>
                                                  <td className="p-2 text-center bg-emerald-50/20"><label className="flex flex-col items-center justify-center cursor-pointer p-1"><input type="checkbox" checked={!!ev.isDone} onChange={(e) => updateEval(ev.id, 'isDone', e.target.checked)} className="w-5 h-5 accent-emerald-500 cursor-pointer rounded mb-1"/><span className={`text-[11px] font-bold mt-1 ${ev.isDone ? 'text-emerald-600' : 'text-stone-400'}`}>{ev.isDone ? '실시완료' : '미실시'}</span></label></td>
                                                  <td className="p-2"><input type="text" value={ev.subject || ''} onChange={(e) => updateEval(ev.id, 'subject', e.target.value)} className="w-full bg-transparent p-2 border-b-2 border-transparent focus:border-emerald-400 outline-none font-medium text-stone-600 rounded-lg"/></td>
                                                  <td className="p-2"><input type="text" value={ev.unit || ''} onChange={(e) => updateEval(ev.id, 'unit', e.target.value)} className="w-full bg-transparent p-2 border-b-2 border-transparent focus:border-emerald-400 outline-none font-medium text-stone-600 rounded-lg"/></td>
                                                  <td className="p-2"><input type="text" value={ev.element || ''} onChange={(e) => updateEval(ev.id, 'element', e.target.value)} className="w-full bg-transparent p-2 border-b-2 border-transparent focus:border-emerald-400 outline-none font-medium text-stone-600 rounded-lg"/></td>
                                                  <td className="p-2"><input type="text" value={ev.domain || ''} onChange={(e) => updateEval(ev.id, 'domain', e.target.value)} className="w-full bg-transparent p-2 border-b-2 border-transparent focus:border-emerald-400 outline-none font-medium text-stone-600 rounded-lg"/></td>
                                                  <td className="p-2"><input type="text" value={ev.period || ''} onChange={(e) => updateEval(ev.id, 'period', e.target.value)} className="w-full text-center bg-transparent p-2 border-b-2 border-transparent focus:border-emerald-400 outline-none font-medium text-stone-600 rounded-lg"/></td>
                                                  <td className="p-2"><input type="text" value={ev.method || ''} onChange={(e) => updateEval(ev.id, 'method', e.target.value)} className="w-full bg-transparent p-2 border-b-2 border-transparent focus:border-emerald-400 outline-none font-medium text-stone-600 rounded-lg"/></td>
                                                  <td className="p-2 text-center"><button onClick={() => deleteEval(ev.id)} className="p-2 text-stone-300 hover:text-rose-400 transition-colors rounded-lg"><Icon name="trash-2" size={18}/></button></td>
                                              </tr>
                                          ))
                                      )}
                                  </React.Fragment>
                              );
                          })}
                          {semEvals.length === 0 && <tr><td colSpan="8" className="p-12 text-center text-stone-400 font-medium bg-stone-50/30">등록된 {semester} 평가계획이 없습니다. 상단의 '엑셀 업로드'를 이용해 주세요.</td></tr>}
                        </tbody>
                      </table>
                    </div>
                  </div>
                );
            };

            return (
              <div className="p-6 bg-white rounded-3xl shadow-sm border border-stone-100">
                <div className="flex justify-between items-center mb-8">
                  <h2 className="text-xl font-bold text-stone-700 flex items-center"><Icon name="file-text" size={24} className="mr-2 text-emerald-500"/> 학기별 평가계획</h2>
                  <div className="flex items-center gap-2 flex-wrap justify-end">
                    <button onClick={handleDownloadTemplate} className="px-4 py-2 bg-white text-emerald-600 border border-emerald-200 rounded-xl hover:bg-emerald-50 font-bold transition-colors text-sm flex items-center shadow-sm gap-1.5"><Icon name="download-cloud" size={16} /> 양식 다운로드</button>
                    <input type="file" accept=".xlsx, .xls, .csv" ref={fileInputRef} onChange={handleFileUpload} className="hidden" />
                    <button onClick={() => fileInputRef.current.click()} className="px-4 py-2 bg-emerald-50 text-emerald-700 border border-emerald-200 rounded-xl hover:bg-emerald-100 font-bold transition-colors text-sm flex items-center shadow-sm gap-1.5"><Icon name="upload" size={16} /> 엑셀 업로드</button>
                    <button onClick={handleExportToSheetsEvaluation} className="px-4 py-2 bg-blue-50 text-blue-700 border border-blue-200 rounded-xl hover:bg-blue-100 font-bold transition-colors text-sm flex items-center shadow-sm gap-1.5" title="이 버튼을 한 번 클릭하고 빈 스프레드시트가 나타났을 때 *Ctrl + V (붙여넣기)*만 하시면 그동안 기록된 표가 구글 스프레드시트에 완벽한 형태로 쏙 들어갑니다!"><Icon name="copy" size={16} /> 스프레드시트로 내보내기</button>
                  </div>
                </div>
                {renderTable('1학기', [3, 4, 5, 6, 7, 0])}
                {renderTable('2학기', [8, 9, 10, 11, 12, 1, 2, 0])}
              </div>
            );
          };

          const renderDailyModal = () => {
            if (!selectedDate) return null;
            
            const dayOfWeek = new Date(selectedDate).getDay(); const isWeekday = dayOfWeek >= 1 && dayOfWeek <= 5;
            const todayHoliday = holidays[selectedDate]; const todayEvent = customEvents[selectedDate];
            const isOffDay = todayHoliday || (todayEvent && (todayEvent.includes('방학') || todayEvent.includes('휴업') || todayEvent.includes('재량')));
            const showTimetable = isWeekday && !isOffDay;

            const dayAttendance = attendance[selectedDate] || [];
            const dayFieldTrips = fieldTrips.filter(ft => selectedDate >= ft.startDate && selectedDate <= ft.endDate);
            const dayTodos = todos[selectedDate] || [];
            const dayCounseling = counseling.filter(c => c.date === selectedDate);
            const selectedMonth = parseInt(selectedDate.split('-')[1], 10);
            const monthEvals = evaluations.filter(ev => { if (typeof ev.period !== 'string') return false; const match = ev.period.match(/([1-9]|1[0-2])월/); return match && parseInt(match[1], 10) === selectedMonth; });

            const draft = dmDrafts[selectedDate] || { attStudent: '', attType: '결석', attSubType: '질병', attPeriod: '', attDocType: 'none', todoText: '', counselStudent: '', counselText: '' };
            const updateDraft = (field, value) => setDmDrafts(prev => ({ ...prev, [selectedDate]: { ...(prev[selectedDate] || { attStudent: '', attType: '결석', attSubType: '질병', attPeriod: '', attDocType: 'none', todoText: '', counselStudent: '', counselText: '' }), [field]: value } }));

            const handleAddAttendance = () => {
              if (!draft.attStudent) return alert('학생을 선택해 주세요.');
              const needsSubType = ['결석', '조퇴', '지각', '결과'].includes(draft.attType);
              const newRecord = { id: Date.now(), studentId: draft.attStudent, type: draft.attType, subType: needsSubType ? draft.attSubType : null, period: draft.attPeriod !== '' ? draft.attPeriod : null, docType: draft.attDocType };
              setAttendance(prev => ({ ...prev, [selectedDate]: [...(prev[selectedDate] || []), newRecord] }));
              updateDraft('attDocType', 'none'); updateDraft('attPeriod', '');
            };
            const handleDelAttendance = (id) => setAttendance(prev => ({ ...prev, [selectedDate]: prev[selectedDate].filter(r => r.id !== id) }));

            const handleAddTodo = (e) => { e.preventDefault(); if (!draft.todoText.trim()) return; const newTodo = { id: Date.now(), text: draft.todoText, done: false }; setTodos(prev => ({ ...prev, [selectedDate]: [...(prev[selectedDate] || []), newTodo] })); updateDraft('todoText', ''); };
            const toggleTodo = (id) => setTodos(prev => ({ ...prev, [selectedDate]: prev[selectedDate].map(t => t.id === id ? { ...t, done: !t.done } : t) }));
            const deleteTodo = (id) => setTodos(prev => ({ ...prev, [selectedDate]: prev[selectedDate].filter(t => t.id !== id) }));

            const handleAddCounseling = () => {
              if (!draft.counselStudent) return alert('학생을 선택해 주세요.');
              if (!draft.counselText.trim()) return alert('상담 내용을 입력해 주세요.');
              setCounseling(prev => [...prev, { id: Date.now(), date: selectedDate, studentId: draft.counselStudent, content: draft.counselText }]);
              updateDraft('counselText', '');
            };

            const saveMemo = () => setMemos(prev => ({ ...prev, [selectedDate]: dmMemoText }));
            const handleCloseModal = () => { saveMemo(); setDmShowMonthEval(false); setIsEditingLink(false); setSelectedDate(null); };

            return (
              <div className="fixed inset-0 bg-stone-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4" onClick={handleCloseModal}>
                <div className="bg-[#fdfbf7] rounded-3xl w-full max-w-4xl max-h-[90vh] overflow-y-auto shadow-2xl flex flex-col" onClick={e => e.stopPropagation()}>
                  <div className="sticky top-0 bg-[#fdfbf7] border-b border-stone-200 px-6 py-5 flex justify-between items-center z-10 rounded-t-3xl">
                    <h3 className="text-2xl font-extrabold text-stone-700 flex items-center gap-2 flex-wrap">
                      {selectedDate} <span className="text-sm font-bold text-stone-400 bg-stone-100 px-3 py-1.5 rounded-xl">{['일','월','화','수','목','금','토'][dayOfWeek]}요일</span>
                      {todayHoliday && <span className="text-sm font-bold text-rose-500 bg-rose-50 px-3 py-1.5 rounded-xl border border-rose-100">{todayHoliday}</span>}
                      {todayEvent && <span className="text-sm font-bold text-emerald-600 bg-emerald-50 px-3 py-1.5 rounded-xl border border-emerald-100">{todayEvent}</span>}
                    </h3>
                    <button onClick={handleCloseModal} className="p-2 hover:bg-stone-200 rounded-full transition-colors text-stone-500"><Icon name="x" size={24}/></button>
                  </div>

                  <div className="p-6 grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div className="space-y-6">
                      <div className="bg-emerald-50/50 p-5 rounded-3xl border border-emerald-100/50">
