                        <h4 className="font-bold text-emerald-800 mb-4 flex items-center"><Icon name="clock" size={18} className="mr-2"/> 당일 시간표</h4>
                        {showTimetable ? (
                          <div className="grid grid-cols-4 gap-3">
                            {timetable[dayOfWeek].map((subj, idx) => (
                              <div key={idx} className="bg-white p-3 rounded-2xl shadow-sm text-center border border-stone-50 flex flex-col">
                                <span className="text-[11px] font-bold text-stone-400 mb-1">{idx+1}교시</span>
                                <span className="font-bold text-stone-600 truncate">{subj || '-'}</span>
                              </div>
                            ))}
                          </div>
                        ) : <div className="text-sm text-stone-400 bg-white p-4 rounded-2xl text-center border border-stone-100 font-medium">{todayHoliday ? `휴업일(${todayHoliday})은 시간표가 없습니다.` : isOffDay ? `휴업일(${todayEvent})은 시간표가 없습니다.` : '주말은 시간표가 없습니다.'}</div>}
                      </div>

                      <div className="bg-emerald-50/30 p-5 rounded-3xl border border-emerald-100/30">
                        <h4 className="font-bold text-emerald-700 mb-4 flex items-center"><Icon name="check" size={18} className="mr-2"/> 오늘 해야 할 일</h4>
                        <form onSubmit={handleAddTodo} className="flex gap-2 mb-4">
                          <input type="text" value={draft.todoText} onChange={e=>updateDraft('todoText', e.target.value)} placeholder="편안한 마음으로 할 일을 적어보세요..." className="flex-1 p-3 border-none bg-white rounded-xl shadow-sm text-sm outline-none focus:ring-2 focus:ring-emerald-200 transition-shadow"/>
                          <button type="submit" className="bg-emerald-500 text-white p-3 rounded-xl hover:bg-emerald-600 shadow-sm transition-colors"><Icon name="plus" size={20}/></button>
                        </form>
                        <div className="space-y-3 max-h-40 overflow-y-auto pr-1">
                          {dayTodos.map(todo => (
                            <div key={todo.id} className="flex items-center justify-between bg-white p-3 rounded-2xl shadow-sm border border-stone-50">
                              <div className="flex items-center gap-3 cursor-pointer flex-1" onClick={() => toggleTodo(todo.id)}>
                                <div className={`w-5 h-5 rounded-full flex items-center justify-center transition-colors ${todo.done ? 'bg-emerald-400 text-white' : 'border-2 border-stone-200'}`}>{todo.done && <Icon name="check" size={14} strokeWidth={3}/>}</div>
                                <span className={`text-sm font-medium ${todo.done ? 'line-through text-stone-300' : 'text-stone-600'}`}>{todo.text}</span>
                              </div>
                              <button onClick={()=>deleteTodo(todo.id)} className="text-stone-300 hover:text-rose-400 p-1 transition-colors"><Icon name="x" size={18}/></button>
                            </div>
                          ))}
                        </div>
                      </div>

                      <div className="bg-amber-50/30 p-5 rounded-3xl border border-amber-100/30">
                        <h4 className="font-bold text-amber-800 mb-4 flex items-center"><Icon name="edit-2" size={18} className="mr-2"/> 일일 메모</h4>
                        <textarea value={dmMemoText} onChange={e=>setDmMemoText(e.target.value)} onBlur={saveMemo} placeholder="오늘 하루 있었던 일이나 잊지 말아야 할 메모를 편안하게 적어보세요." className="w-full p-4 border-none bg-white rounded-2xl shadow-sm text-sm outline-none resize-none h-24 focus:ring-2 focus:ring-amber-200 transition-shadow leading-relaxed" />
                      </div>
                    </div>

                    <div className="space-y-6">
                      <div className="bg-rose-50/30 p-5 rounded-3xl border border-rose-100/30">
                        <h4 className="font-bold text-rose-800 mb-4 flex items-center"><Icon name="users" size={18} className="mr-2"/> 학생 출결</h4>
                        <div className="flex flex-wrap gap-2 mb-4 items-center">
                          <select value={draft.attStudent} onChange={e=>updateDraft('attStudent', e.target.value)} className="flex-1 min-w-[100px] p-3 border-none bg-white rounded-xl shadow-sm text-sm outline-none font-medium text-stone-600">
                            <option value="">학생 선택</option>
                            {[...students].sort((a,b)=>a.number - b.number).map(s => <option key={s.id} value={s.id}>{s.number}번 {s.name}</option>)}
                          </select>
                          <select value={draft.attType} onChange={e=>updateDraft('attType', e.target.value)} className="w-24 p-3 border-none bg-white rounded-xl shadow-sm text-sm outline-none font-medium text-stone-600">
                            <option value="결석">결석</option><option value="조퇴">조퇴</option><option value="지각">지각</option><option value="결과">결과</option>
                          </select>
                          {['결석', '조퇴', '지각', '결과'].includes(draft.attType) && (
                            <select value={draft.attSubType} onChange={e=>updateDraft('attSubType', e.target.value)} className="w-20 p-3 border-none bg-white rounded-xl shadow-sm text-sm outline-none font-medium text-stone-600">
                              {ATTENDANCE_SUB_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
                            </select>
                          )}
                          <select value={draft.attPeriod} onChange={e=>updateDraft('attPeriod', e.target.value)} className="w-24 p-3 border-none bg-white rounded-xl shadow-sm text-sm outline-none font-medium text-stone-600">
                            <option value="">종일/전체</option>{[1,2,3,4,5,6,7,8].map(p => <option key={p} value={p}>{p}교시</option>)}
                          </select>
                          <div className="flex items-center gap-3 bg-white px-3 h-12 rounded-xl shadow-sm border border-transparent">
                            <label className="flex items-center gap-1.5 cursor-pointer"><input type="radio" name="docType" value="none" checked={draft.attDocType === 'none'} onChange={e => updateDraft('attDocType', e.target.value)} className="w-4 h-4 accent-emerald-500 cursor-pointer" /><span className="text-[13px] font-bold text-stone-600">없음</span></label>
                            <label className="flex items-center gap-1.5 cursor-pointer"><input type="radio" name="docType" value="paper" checked={draft.attDocType === 'paper'} onChange={e => updateDraft('attDocType', e.target.value)} className="w-4 h-4 accent-emerald-500 cursor-pointer" /><span className="text-[13px] font-bold text-stone-600">서류</span></label>
                            <label className="flex items-center gap-1.5 cursor-pointer"><input type="radio" name="docType" value="neis" checked={draft.attDocType === 'neis'} onChange={e => updateDraft('attDocType', e.target.value)} className="w-4 h-4 accent-emerald-500 cursor-pointer" /><span className="text-[13px] font-bold text-stone-600">NEIS</span></label>
                          </div>
                          <button onClick={handleAddAttendance} className="bg-rose-400 text-white p-3 rounded-xl hover:bg-rose-500 shadow-sm transition-colors flex items-center justify-center"><Icon name="plus" size={20}/></button>
                        </div>
                        
                        <div className="space-y-2 max-h-32 overflow-y-auto pr-1">
                          {dayAttendance.map(att => {
                            const st = students.find(s=>s.id === att.studentId);
                            const isPaper = att.docType === 'paper' || att.docSubmitted; const isNeis = att.docType === 'neis';
                            return (
                              <div key={att.id} className="flex justify-between items-center bg-white p-3 rounded-2xl border border-stone-50 shadow-sm text-sm">
                                <div className="flex items-center gap-2 flex-wrap">
                                  <span className="font-extrabold text-stone-600">{st ? st.name : '삭제된 학생'}</span> <span className="text-stone-300">|</span> 
                                  <span className={`font-bold ${att.type==='결석'?'text-rose-500':att.type==='조퇴'?'text-amber-500':att.type==='지각'?'text-indigo-500':att.type==='결과'?'text-violet-500':'text-sky-500'}`}>{att.type}{att.subType ? `(${att.subType})` : ''} {att.period ? `${att.period}교시` : ''}</span>
                                  {isPaper && (<span className="flex items-center gap-1 ml-1 px-1.5 py-0.5 bg-emerald-50 text-emerald-600 text-[11px] font-extrabold rounded-md border border-emerald-100"><Icon name="file-check" size={12} /> 서류</span>)}
                                  {isNeis && (<span className="flex items-center gap-1 ml-1 px-1.5 py-0.5 bg-blue-50 text-blue-600 text-[11px] font-extrabold rounded-md border border-blue-100"><Icon name="monitor" size={12} /> NEIS</span>)}
                                </div>
                                <button onClick={()=>handleDelAttendance(att.id)} className="text-stone-300 hover:text-rose-400 p-1 transition-colors"><Icon name="trash-2" size={16}/></button>
                              </div>
                            )
                          })}
                        </div>
                        
                        {!isEditingLink ? (
                            <div className="mt-4 flex items-center gap-2">
                                <a href={docLink || '#'} target="_blank" rel="noopener noreferrer" className="flex-1 flex items-center justify-between p-3.5 bg-white/80 hover:bg-white rounded-2xl shadow-sm border border-rose-100 hover:border-rose-300 transition-all text-sm font-bold text-stone-700 group">
                                    <span className="flex items-center gap-2"><Icon name="external-link" size={18} className="text-rose-500"/> 출결 제출 서류 안내 및 다운로드</span><Icon name="chevron-right" size={18} className="text-stone-400 group-hover:text-rose-500 transition-colors"/>
                                </a>
                                <button onClick={() => { setTempLink(docLink); setIsEditingLink(true); }} className="p-3.5 bg-white/80 hover:bg-white rounded-2xl shadow-sm border border-stone-100 hover:border-emerald-200 transition-all text-stone-400 hover:text-emerald-500" title="링크 주소 변경"><Icon name="settings" size={18} /></button>
                            </div>
                        ) : (
                            <div className="mt-4 flex items-center gap-2 p-2 bg-white rounded-2xl shadow-sm border border-emerald-300 transition-all">
                                <Icon name="link" size={18} className="text-emerald-500 ml-2" />
                                <input type="text" value={tempLink} onChange={(e) => setTempLink(e.target.value)} placeholder="연결할 웹주소(URL)를 입력하세요" className="flex-1 p-1.5 bg-transparent outline-none text-sm text-stone-600 font-medium" />
                                <button onClick={() => { setDocLink(tempLink); setIsEditingLink(false); }} className="px-3 py-1.5 bg-emerald-500 text-white rounded-xl font-bold text-sm hover:bg-emerald-600 transition-colors">저장</button>
                                <button onClick={() => setIsEditingLink(false)} className="px-3 py-1.5 bg-stone-100 text-stone-500 rounded-xl font-bold text-sm hover:bg-stone-200 transition-colors">취소</button>
                            </div>
                        )}
                      </div>

                      <div className="bg-blue-50/30 p-5 rounded-3xl border border-blue-100/30">
                        <div className="flex justify-between items-center mb-4"><h4 className="font-bold text-blue-800 flex items-center"><Icon name="bus" size={18} className="mr-2"/> 당일 교외체험학습 상황</h4><span className="text-[11px] text-blue-400 font-bold bg-blue-50 px-2 py-0.5 rounded-lg border border-blue-100">매니저 연동</span></div>
                        <div className="space-y-2 max-h-32 overflow-y-auto pr-1">
                          {dayFieldTrips.length === 0 ? (<div className="text-sm text-stone-400 text-center py-4 font-medium bg-white/50 rounded-2xl">당일 체험학습 없음.</div>) : (
                            dayFieldTrips.map(ft => {
                              const st = students.find(s=>s.id === ft.studentId);
                              return (<div key={ft.id} className="flex justify-between items-center bg-white p-3 rounded-2xl border border-stone-50 shadow-sm text-sm"><div className="font-extrabold text-stone-600 flex items-center gap-2">{st ? `${st.number}번 ${st.name}` : '삭제된 학생'} <span className="text-[11px] px-2 py-0.5 bg-blue-50 text-blue-600 rounded-md">교외체험 ({ft.duration}일)</span></div></div>)
                            })
                          )}
                        </div>
                      </div>

                      <div className="bg-sky-50/30 p-5 rounded-3xl border border-sky-100/30">
                        <h4 className="font-bold text-sky-800 mb-4 flex items-center"><Icon name="book-open" size={18} className="mr-2"/> 당일 상담 기록</h4>
                        <div className="space-y-3 mb-4">
                          <select value={draft.counselStudent} onChange={e=>updateDraft('counselStudent', e.target.value)} className="w-full p-3 border-none bg-white rounded-xl shadow-sm text-sm outline-none font-medium text-stone-600">
                            <option value="">학생을 선택하세요</option>
                            {[...students].sort((a,b)=>a.number - b.number).map(s => <option key={s.id} value={s.id}>{s.number}번 {s.name}</option>)}
                          </select>
                          <textarea value={draft.counselText} onChange={e=>updateDraft('counselText', e.target.value)} placeholder="아이의 이야기를 남겨주세요..." className="w-full p-3 border-none bg-white rounded-xl shadow-sm text-sm outline-none resize-none h-20 focus:ring-2 focus:ring-sky-200 transition-shadow" />
                          <button onClick={handleAddCounseling} className="w-full bg-sky-400 text-white py-3 rounded-xl hover:bg-sky-500 font-bold text-sm shadow-sm transition-colors">상담 기록 저장</button>
                        </div>
                        <div className="space-y-3 max-h-32 overflow-y-auto pr-1">
                          {dayCounseling.map(c => {
                            const st = students.find(s=>s.id === c.studentId);
                            return (<div key={c.id} className="bg-white p-3.5 rounded-2xl border border-stone-50 shadow-sm text-sm"><div className="font-bold text-sky-700 mb-1">{st ? st.name : '삭제된 학생'}</div><p className="text-stone-500 truncate leading-relaxed">{c.content}</p></div>)
                          })}
                        </div>
                      </div>
                    </div>
                    
                    <div className="col-span-1 md:col-span-2 mt-2 bg-indigo-50/40 p-5 rounded-3xl border border-indigo-100/50">
                        <button onClick={() => setDmShowMonthEval(!dmShowMonthEval)} className="w-full flex justify-between items-center font-black text-indigo-800 focus:outline-none">
                            <span className="flex items-center text-lg"><Icon name="file-text" size={20} className="mr-2 text-indigo-600"/> 이 달의 평가계획 ({selectedMonth}월)</span>
                            <div className="flex items-center gap-2"><span className="text-sm bg-indigo-100 text-indigo-700 px-3 py-1.5 rounded-xl font-bold">{monthEvals.length}건 예정</span><Icon name={dmShowMonthEval ? "chevron-up" : "chevron-down"} size={20} className="text-indigo-400"/></div>
                        </button>
                        {dmShowMonthEval && (
                            <div className="mt-5 space-y-3">
                                {monthEvals.length === 0 ? (<div className="text-sm text-stone-400 text-center py-6 font-medium bg-white/70 rounded-2xl border border-dashed border-indigo-100">이번 달({selectedMonth}월)에 계획된 평가가 없습니다.</div>) : (
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                        {monthEvals.map(ev => (
                                            <div key={ev.id} className="bg-white p-5 rounded-2xl border border-stone-100 shadow-sm hover:border-indigo-200 transition-colors">
                                                <div className="flex justify-between items-start mb-3">
                                                    <div className="font-extrabold text-indigo-700 text-base flex items-center gap-2">{ev.subject || '과목미지정'} <span className="bg-stone-100 text-stone-500 font-bold text-xs px-2 py-0.5 rounded-md">{ev.period}</span></div>
                                                    <span className={`text-xs px-2.5 py-1 rounded-lg font-bold ${ev.isDone ? 'bg-emerald-50 text-emerald-600 border border-emerald-100' : 'bg-rose-50 text-rose-500 border border-rose-100'}`}>{ev.isDone ? '완료됨' : '진행 예정'}</span>
                                                </div>
                                                <div className="font-bold text-stone-700 mb-1.5 text-sm">{ev.unit || '-'}</div><div className="text-stone-500 text-sm leading-relaxed">{ev.element || ev.content || '-'}</div>
                                                <div className="mt-3 flex gap-2 pt-3 border-t border-stone-50"><span className="text-xs font-bold text-stone-400 bg-stone-50 px-2 py-1 rounded-md">방법: {ev.tool || ev.method || '-'}</span></div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                  </div>
                </div>
              </div>
            );
          };

          const renderStudentDetailModal = () => {
            if (!selectedStudentForModal) return null;
            const student = students.find(s => s.id === selectedStudentForModal); if (!student) return null;
            const studentRecords = [];
            Object.entries(attendance).forEach(([date, records]) => { records.forEach(record => { if (record.studentId === selectedStudentForModal) { studentRecords.push({ ...record, date }); } }); });
            studentRecords.sort((a, b) => new Date(b.date) - new Date(a.date));

            const handleDelete = (date, recordId) => { if(window.confirm('이 출결 기록을 삭제하시겠습니까?')) setAttendance(prev => ({ ...prev, [date]: prev[date].filter(r => r.id !== recordId) })); };
            const stats = studentStats[selectedStudentForModal] || { absent: 0, early: 0, late: 0, missed: 0, period: 0, recognized: 0, field: 0 };

            return (
              <div className="fixed inset-0 bg-stone-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4" onClick={() => setSelectedStudentForModal(null)}>
                <div className="bg-[#fdfbf7] rounded-[2rem] w-full max-w-md max-h-[80vh] flex flex-col shadow-2xl overflow-hidden" onClick={e => e.stopPropagation()}>
                  <div className="px-6 py-6 border-b border-stone-100 flex justify-between items-center bg-white">
                    <h3 className="text-xl font-extrabold text-stone-700 flex items-center"><Icon name="users" size={24} className="mr-3 text-emerald-500" />{student.name} <span className="text-stone-400 text-sm font-bold ml-2">학생 출결 상세</span></h3>
                    <button onClick={() => setSelectedStudentForModal(null)} className="p-2 hover:bg-stone-100 rounded-full transition-colors text-stone-400"><Icon name="x" size={20}/></button>
                  </div>
                  
                  <div className="bg-stone-50 p-4 border-b border-stone-100 grid grid-cols-4 sm:grid-cols-7 gap-2">
                    <div className="bg-white rounded-xl p-2 text-center shadow-sm border border-stone-100"><span className="text-[10px] font-bold text-rose-400 block mb-1">결석</span><div className="font-black text-rose-600">{stats.absent}</div></div>
                    <div className="bg-white rounded-xl p-2 text-center shadow-sm border border-stone-100"><span className="text-[10px] font-bold text-amber-400 block mb-1">조퇴</span><div className="font-black text-amber-600">{stats.early}</div></div>
                    <div className="bg-white rounded-xl p-2 text-center shadow-sm border border-stone-100"><span className="text-[10px] font-bold text-indigo-400 block mb-1">지각</span><div className="font-black text-indigo-600">{stats.late}</div></div>
                    <div className="bg-white rounded-xl p-2 text-center shadow-sm border border-stone-100"><span className="text-[10px] font-bold text-violet-400 block mb-1">결과</span><div className="font-black text-violet-600">{stats.missed}</div></div>
                    <div className="bg-white rounded-xl p-2 text-center shadow-sm border border-stone-100"><span className="text-[10px] font-bold text-pink-400 block mb-1">생출</span><div className="font-black text-pink-600">{stats.period}</div></div>
                    <div className="bg-white rounded-xl p-2 text-center shadow-sm border border-stone-100"><span className="text-[10px] font-bold text-teal-400 block mb-1">인정</span><div className="font-black text-teal-600">{stats.recognized}</div></div>
                    <div className="bg-white rounded-xl p-2 text-center shadow-sm border border-stone-100 col-span-2 sm:col-span-1"><span className="text-[10px] font-bold text-blue-400 block mb-1">교외</span><div className="font-black text-blue-600">{stats.field}</div></div>
                  </div>

                  <div className="p-6 overflow-y-auto flex-1">
                    {studentRecords.length === 0 ? (<div className="text-center py-12 text-stone-400 bg-white rounded-3xl border border-dashed border-stone-200 font-medium shadow-sm">기록된 출결 사항이 없습니다.</div>) : (
                      <div className="space-y-3">
                        {studentRecords.map(record => {
                          const isPaper = record.docType === 'paper' || record.docSubmitted; const isNeis = record.docType === 'neis';
                          let displayType = record.type;
                          let displayClass = 'bg-stone-50 text-stone-500';
                          
                          if (record.subType === '생리') {
                            displayType = `생출(${record.type})`;
                            displayClass = 'bg-pink-50 text-pink-500 border border-pink-100';
                          } else if (record.type === '결석' && (record.subType === '감염병' || record.subType === '경조사')) {
                            displayType = `인정결석(${record.subType})`;
                            displayClass = 'bg-teal-50 text-teal-600 border border-teal-100';
                          } else {
                            if (record.type === '결석') displayClass = 'bg-rose-50 text-rose-500 border border-rose-100';
                            else if (record.type === '조퇴') displayClass = 'bg-amber-50 text-amber-500 border border-amber-100';
                            else if (record.type === '지각') displayClass = 'bg-indigo-50 text-indigo-500 border border-indigo-100';
                            else if (record.type === '결과') displayClass = 'bg-violet-50 text-violet-500 border border-violet-100';
                            else displayClass = 'bg-sky-50 text-sky-500 border border-sky-100';
                            
                            displayType = `${record.type}${record.subType ? `(${record.subType})` : ''}`;
                          }

                          return (
                            <div key={record.id} className="flex justify-between items-center p-4 border border-stone-100 rounded-2xl hover:border-emerald-200 hover:shadow-sm bg-white transition-all">
                              <div className="flex items-center gap-3">
                                <span className="font-extrabold text-stone-600">{record.date}</span>
                                <div className="flex flex-col items-start gap-1">
                                  <span className={`px-2.5 py-1 rounded-xl text-xs font-extrabold flex items-center gap-1 ${displayClass}`}>
                                    {displayType} {record.period ? ` ${record.period}교시` : ''}
                                  </span>
                                  {isPaper && (<span className="flex items-center gap-1 px-2 py-0.5 bg-emerald-50 border border-emerald-100 text-emerald-600 text-[11px] font-extrabold rounded-md"><Icon name="file-check" size={12} /> 서류 완료</span>)}
                                  {isNeis && (<span className="flex items-center gap-1 px-2 py-0.5 bg-blue-50 border border-blue-100 text-blue-600 text-[11px] font-extrabold rounded-md"><Icon name="monitor" size={12} /> NEIS 결재</span>)}
                                </div>
                              </div>
                              <button onClick={() => handleDelete(record.date, record.id)} className="text-stone-300 hover:text-rose-400 transition-colors p-2 rounded-full hover:bg-rose-50"><Icon name="trash-2" size={18}/></button>
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </div>
                  <div className="p-5 border-t border-stone-100 bg-white">
                    <button onClick={() => setSelectedStudentForModal(null)} className="w-full py-4 bg-stone-700 text-white font-bold rounded-2xl hover:bg-stone-800 active:scale-95 transition-all shadow-sm">닫기</button>
                  </div>
                </div>
              </div>
            );
          };

          const renderEventEditModal = () => {
            if (!isEventModalOpen) return null;
            const handleAddEvent = () => {
              if (!evDate || !evName.trim()) return;
              if (evType === 'holiday') setHolidays(prev => ({ ...prev, [evDate]: evName })); else setCustomEvents(prev => ({ ...prev, [evDate]: evName }));
              setEvDate(''); setEvName('');
            };
            const handleDelete = (date, type) => {
              if (type === 'holiday') { const updated = { ...holidays }; delete updated[date]; setHolidays(updated); }
              else { const updated = { ...customEvents }; delete updated[date]; setCustomEvents(updated); }
            };
            const combinedEvents = [...Object.entries(holidays).map(([date, name]) => ({ date, name, type: 'holiday' })), ...Object.entries(customEvents).map(([date, name]) => ({ date, name, type: 'event' }))].sort((a, b) => a.date.localeCompare(b.date));

            return (
              <div className="fixed inset-0 bg-stone-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4" onClick={() => setIsEventModalOpen(false)}>
                <div className="bg-[#fdfbf7] rounded-[2rem] w-full max-w-md p-6 shadow-2xl flex flex-col max-h-[85vh]" onClick={e => e.stopPropagation()}>
                  <div className="flex justify-between items-center mb-6"><h3 className="text-xl font-extrabold flex items-center gap-2 text-stone-700"><Icon name="calendar" className="text-emerald-500"/>학사일정 편집</h3><button onClick={() => setIsEventModalOpen(false)} className="p-2 hover:bg-stone-200 rounded-full transition text-stone-400"><Icon name="x" size={20}/></button></div>
                  <div className="flex flex-col gap-3 mb-6 bg-white p-5 rounded-3xl border border-stone-100 shadow-sm">
                    <div className="flex gap-2">
                      <select value={evType} onChange={e => setEvType(e.target.value)} className="w-32 p-3 bg-stone-50 border-none rounded-xl text-sm outline-none focus:ring-2 focus:ring-emerald-200 font-bold text-stone-600"><option value="event">일반일정</option><option value="holiday">공휴일(휴업)</option></select>
                      <input type="date" value={evDate} onChange={e => setEvDate(e.target.value)} className="flex-1 p-3 bg-stone-50 border-none rounded-xl text-sm outline-none focus:ring-2 focus:ring-emerald-200 font-medium text-stone-600" />
                    </div>
                    <input type="text" placeholder="일정 이름 (예: 현장체험학습)" value={evName} onChange={e => setEvName(e.target.value)} className="w-full p-3 bg-stone-50 border-none rounded-xl text-sm outline-none focus:ring-2 focus:ring-emerald-200 font-medium text-stone-600" />
                    <button onClick={handleAddEvent} className="w-full bg-emerald-500 text-white py-3.5 rounded-xl font-bold hover:bg-emerald-600 transition active:scale-95 flex justify-center items-center gap-2 mt-2 shadow-sm"><Icon name="plus" size={18} strokeWidth={3} /> 일정 추가하기</button>
                  </div>
                  <div className="flex-1 overflow-y-auto space-y-3 pr-1 border-t border-stone-100 pt-5">
                    {combinedEvents.length === 0 ? (<p className="text-center text-sm text-stone-400 py-6 font-medium">등록된 일정이 없습니다.</p>) : (
                      combinedEvents.map((item) => (
                        <div key={`${item.date}-${item.type}`} className="flex justify-between items-center p-4 bg-white hover:bg-stone-50 rounded-2xl border border-stone-100 transition shadow-sm">
                          <div><div className="flex items-center gap-3"><span className={`text-[11px] px-2 py-1 rounded-lg font-extrabold ${item.type === 'holiday' ? 'bg-rose-50 text-rose-500' : 'bg-emerald-50 text-emerald-600'}`}>{item.type === 'holiday' ? '공휴일' : '일정'}</span><span className="font-extrabold text-stone-600">{item.name}</span></div><div className="text-xs font-bold text-stone-400 mt-2">{item.date}</div></div>
                          <button onClick={() => handleDelete(item.date, item.type)} className="p-2.5 text-stone-300 hover:bg-rose-50 hover:text-rose-400 rounded-xl transition"><Icon name="trash-2" size={18} /></button>
                        </div>
                      ))
                    )}
                  </div>
                  <div className="mt-5 border-t border-stone-100 pt-5"><button onClick={() => setIsEventModalOpen(false)} className="w-full py-4 bg-stone-700 text-white font-bold rounded-2xl shadow-sm hover:bg-stone-800 active:scale-95 transition-all text-lg">완료 및 닫기</button></div>
                </div>
              </div>
            );
          };

          // --- 전체 데이터 백업 및 복원 모달 ---
          const renderSettingsModal = () => {
              if (!isSettingsModalOpen) return null;
              return (
                  <div className="fixed inset-0 bg-stone-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4" onClick={() => setIsSettingsModalOpen(false)}>
                      <div className="bg-[#fdfbf7] rounded-[2rem] w-full max-w-md p-8 shadow-2xl flex flex-col" onClick={e => e.stopPropagation()}>
                          <div className="flex justify-between items-center mb-8">
                              <h3 className="text-2xl font-extrabold flex items-center gap-2 text-stone-800"><Icon name="settings" className="text-emerald-600" size={28}/>데이터 백업 및 복구</h3>
                              <button onClick={() => setIsSettingsModalOpen(false)} className="p-2 hover:bg-stone-200 rounded-full transition text-stone-400"><Icon name="x" size={24}/></button>
                          </div>
                          
                          <div className="space-y-6">
                              {/* 백업 파트 */}
                              <div className="bg-white p-6 rounded-3xl border border-emerald-100 shadow-sm">
                                  <div className="w-12 h-12 bg-emerald-50 text-emerald-600 rounded-2xl flex items-center justify-center mb-4"><Icon name="download-cloud" size={24} /></div>
                                  <h4 className="font-extrabold text-lg text-stone-800 mb-2">현재 데이터 100% 백업하기</h4>
                                  <p className="text-sm text-stone-500 font-medium mb-5 leading-relaxed">명렬표, 출결, 상담, 달력 메모, 평가계획 등 앱 내의 모든 데이터를 하나의 파일(.json)로 안전하게 저장합니다.</p>
                                  <button onClick={handleDownloadBackup} className="w-full py-3.5 bg-emerald-600 text-white font-bold rounded-xl hover:bg-emerald-700 transition shadow-sm flex items-center justify-center gap-2"><Icon name="download" size={18}/> 백업 파일 다운로드</button>
                              </div>

                              {/* 복원 파트 */}
                              <div className="bg-white p-6 rounded-3xl border border-blue-100 shadow-sm">
                                  <div className="w-12 h-12 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center mb-4"><Icon name="upload-cloud" size={24} /></div>
                                  <h4 className="font-extrabold text-lg text-stone-800 mb-2">백업된 데이터 불러오기</h4>
                                  <p className="text-sm text-stone-500 font-medium mb-5 leading-relaxed">기기를 변경하셨거나 앱이 초기화되었을 때, 이전에 다운로드해 둔 백업 파일(.json)을 업로드하여 복원합니다.</p>
                                  <input type="file" accept=".json" ref={backupInputRef} onChange={handleUploadBackup} className="hidden" />
                                  <button onClick={() => backupInputRef.current.click()} className="w-full py-3.5 bg-blue-50 text-blue-700 border border-blue-200 font-bold rounded-xl hover:bg-blue-100 transition shadow-sm flex items-center justify-center gap-2"><Icon name="upload" size={18}/> 백업 파일 불러오기</button>
                              </div>
                          </div>
                      </div>
                  </div>
              );
          };

          return (
            <div className="min-h-screen bg-[#fdfbf7] text-stone-800 pb-10">
              <nav className="bg-emerald-600 text-white shadow-sm border-b border-emerald-700/50">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                  <div className="flex items-center justify-between h-16">
                    <div className="flex items-center">
                      <Icon name="notebook-pen" size={28} className="mr-3 text-emerald-100" />
                      <span className="font-extrabold text-2xl tracking-wide">Teachers' Mate</span>
                    </div>
                    <div className="flex items-center gap-2">
                      <button onClick={() => setIsSettingsModalOpen(true)} className="px-3 py-1.5 bg-emerald-700/30 hover:bg-emerald-700 rounded-xl text-xs font-bold transition-colors flex items-center gap-1.5" title="데이터 백업 및 복구">
                         <Icon name="settings" size={14} /> 백업/설정
                      </button>
                      <button onClick={onLogout} className="px-3 py-1.5 bg-emerald-700/50 hover:bg-emerald-700 rounded-xl text-xs font-bold transition-colors flex items-center gap-1.5 shadow-inner">
                         <Icon name="lock" size={14} /> 잠금
                      </button>
                    </div>
                  </div>
                </div>
                
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                  <div className="flex space-x-2 overflow-x-auto pt-2 pb-0 scrollbar-hide">
                    {[
                      { id: 'calendar', name: '학사달력', icon: 'calendar' },
                      { id: 'fieldTrip', name: '교외체험 매니저', icon: 'bus' },
                      { id: 'roster', name: '출결 통계', icon: 'users' },
                      { id: 'counseling', name: '상담', icon: 'book-open' },
                      { id: 'timetable', name: '기초시간표', icon: 'clock' },
                      { id: 'evaluation', name: '평가계획', icon: 'file-text' },
                    ].map(tab => (
                      <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex items-center px-5 py-3 rounded-t-2xl transition-colors whitespace-nowrap text-sm font-bold ${activeTab === tab.id ? 'bg-[#fdfbf7] text-emerald-700 shadow-lg translate-y-px' : 'text-emerald-100 hover:bg-emerald-500'}`}>
                        <Icon name={tab.icon} size={18} className="mr-2" /> {tab.name}
                      </button>
                    ))}
                  </div>
                </div>
              </nav>

              <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                {activeTab === 'calendar' && (
                  <div className="bg-white p-8 rounded-3xl shadow-sm border border-stone-100">
                    <div className="flex items-center justify-between mb-8 flex-wrap gap-4">
                      <h2 className="text-2xl font-extrabold text-stone-700 flex items-center"><Icon name="calendar" className="mr-3 text-emerald-500"/>{currentDate.getFullYear()}년 {currentDate.getMonth() + 1}월</h2>
                      <div className="flex space-x-2 flex-wrap gap-y-2 justify-end">
                        <button onClick={() => setIsEventModalOpen(true)} className={`px-4 py-2 rounded-xl font-bold transition text-sm flex items-center gap-2 bg-stone-50 hover:bg-stone-100 text-stone-600`}><Icon name="edit-2" size={16} /> 학사일정 편집</button>
                        <div className="w-px bg-stone-200 mx-2 hidden sm:block"></div>
                        <button onClick={prevMonth} className="p-2.5 bg-stone-50 rounded-xl hover:bg-stone-100 transition text-stone-600"><Icon name="chevron-left" size={20}/></button>
                        <button onClick={() => setCurrentDate(new Date())} className="px-5 py-2.5 bg-emerald-50 text-emerald-600 rounded-xl hover:bg-emerald-100 font-bold transition text-sm">오늘</button>
                        <button onClick={nextMonth} className="p-2.5 bg-stone-50 rounded-xl hover:bg-stone-100 transition text-stone-600"><Icon name="chevron-right" size={20}/></button>
                        <div className="w-px bg-stone-200 mx-2 hidden sm:block"></div>
                        <button onClick={handleExportCalendarToSheets} className={`px-4 py-2 rounded-xl font-bold transition text-sm flex items-center gap-2 bg-blue-50 text-blue-700 hover:bg-blue-100`} title="이 버튼을 한 번 클릭하고 빈 스프레드시트가 나타났을 때 *Ctrl + V (붙여넣기)*만 하시면 그동안 기록된 표가 구글 스프레드시트에 완벽한 형태로 쏙 들어갑니다!"><Icon name="copy" size={16} /> 스프레드시트로 내보내기</button>
                      </div>
                    </div>
                    <div className="grid grid-cols-7 gap-3 mt-4">
                      {['일', '월', '화', '수', '목', '금', '토'].map((day, i) => (<div key={day} className={`py-3 text-center font-extrabold text-sm rounded-xl mb-2 ${i === 0 ? 'text-rose-400 bg-rose-50/50' : i === 6 ? 'text-sky-400 bg-sky-50/50' : 'text-stone-500 bg-stone-50/50'}`}>{day}</div>))}
                      {renderCalendar()}
                    </div>
                  </div>
                )}
                {activeTab === 'fieldTrip' && renderFieldTrip()}
                {activeTab === 'roster' && (<div className="space-y-8">{renderRoster()}{renderRosterSetup()}</div>)}
                {activeTab === 'counseling' && renderCounseling()}
                {activeTab === 'timetable' && renderTimetable()}
                {activeTab === 'evaluation' && renderEvaluation()}
              </main>

              <footer className="w-full text-center pt-8 pb-4 text-stone-400 text-sm font-bold">
                &copy; 2026 Appro Lee. All Rights Reserved.
              </footer>

              {renderDailyModal()}
              {renderStudentDetailModal()}
              {renderEventEditModal()}
              {renderSettingsModal()}
            </div>
          );
        }

        // --- 메인 진입점 (인증 분기 처리) ---
        function App() {
          const [isAuthenticated, setIsAuthenticated] = useState(false);
          const [hasPin, setHasPin] = useState(false);
          const [isChecking, setIsChecking] = useState(true);

          useEffect(() => {
              const savedPin = localStorage.getItem('tm_local_pin');
              if (savedPin) setHasPin(true);
              setIsChecking(false);
          }, []);

          if (isChecking) return null;
          
          if (!isAuthenticated) return <PinScreen key={hasPin ? 'login' : 'setup'} isSetup={!hasPin} onComplete={() => { setHasPin(true); setIsAuthenticated(true); }} />;
          
          return <MainApp onLogout={() => setIsAuthenticated(false)} />;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
